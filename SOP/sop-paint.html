<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Paint SOP</title>

<link
    rel="stylesheet"
    href="/core/platform1.css"
>

<script>
window.sidebarPath = "/core/sidebar.html";
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/core/api/supabase.js"></script>

<script src="/core/layout.js" defer></script>

<style>

.sop-wrap{

    width:100%;

}

.sop-card{

    width:100%;

    min-height:
        calc(100vh - 160px);

    background:
        rgba(255,255,255,0.03);

    border:
        1px solid rgba(255,255,255,0.06);

    border-radius:10px;

    padding:22px;

    display:flex;

    flex-direction:column;

}

.sop-toolbar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:16px;

    gap:12px;

    flex-wrap:wrap;

}

.toolbar-left{

    display:flex;

    align-items:center;

    gap:8px;

    flex-wrap:wrap;

}

.toolbar-btn{

    background:
        rgba(255,255,255,0.05);

    border:
        1px solid rgba(255,255,255,0.08);

    color:white;

    padding:6px 10px;

    border-radius:6px;

    cursor:pointer;

    font-size:13px;

}

.toolbar-btn:hover{

    background:
        rgba(255,255,255,0.09);

}

.sop-meta{

    display:flex;

    align-items:center;

    gap:12px;

    color:rgba(255,255,255,0.55);

    font-size:12px;

}

.save-indicator{

    color:var(--accent);

}

.sop-editor{

    flex:1;

    width:100%;

    outline:none;

    line-height:1.7;

    font-size:14px;

    white-space:pre-wrap;

    transition:0.15s;

}

.sop-editor.editing{

    background:
        rgba(255,255,255,0.02);

    box-shadow:
        0 0 0 1px rgba(255,255,255,0.04);

    border-radius:8px;

    padding:10px;

}

.sop-editor h1{

    font-size:32px;

    margin-top:30px;

    margin-bottom:12px;

}

.sop-editor h2{

    font-size:22px;

    margin-top:24px;

    margin-bottom:10px;

}

.sop-editor p{

    margin-bottom:14px;

}

.sop-editor ul{

    padding-left:24px;

    margin-bottom:14px;

}

.sop-editor li{

    margin-bottom:6px;

}

.sop-editor a{

    color:var(--accent);

    font-weight:500;

    text-decoration:none;

}

.sop-editor a:hover{

    text-decoration:underline;

}

</style>

</head>

<body
    class="platform-body"
    data-title="Paint SOP"
    data-description="Operational SOP documentation."
>

<div class="app">

    <!-- SIDEBAR -->

    <aside
        class="sidebar"
        id="sidebar"
    ></aside>

    <!-- MAIN -->

    <main class="main platform-page">

        <!-- TOPBAR -->

        <div id="topbar"></div>

        <!-- CONTENT -->

        <div class="content">

            <div class="sop-wrap">

                <div class="sop-card">

                    <!-- TOOLBAR -->

                    <div class="sop-toolbar">

                        <div class="toolbar-left">

                            <button
                                class="toolbar-btn"
                                id="editBtn"
                            >
                                Edit
                            </button>

                            <button
                                class="toolbar-btn"
                                onclick="formatDoc('formatBlock','<h1>')"
                            >
                                H1
                            </button>

                            <button
                                class="toolbar-btn"
                                onclick="formatDoc('formatBlock','<h2>')"
                            >
                                H2
                            </button>

                            <button
                                class="toolbar-btn"
                                onclick="formatDoc('bold')"
                            >
                                Bold
                            </button>

                            <button
                                class="toolbar-btn"
                                onclick="formatDoc('insertUnorderedList')"
                            >
                                • List
                            </button>

                            <button
                                class="toolbar-btn"
                                id="linkBtn"
                            >
                                Link
                            </button>

                        </div>

                        <div class="sop-meta">

                            <div
                                id="lastUpdated"
                            >
                                Last updated: —
                            </div>

                            <div
                                class="save-indicator"
                                id="saveIndicator"
                            >
                                
                            </div>

                        </div>

                    </div>

                    <!-- EDITOR -->

                    <div
                        id="sopEditor"
                        class="sop-editor"
                        contenteditable="false"
                    ></div>

                </div>

            </div>

        </div>

    </main>

</div>

<script>

// ========================================
// CONFIG
// ========================================

const SOP_SLUG =
    "paint-sop";

const SOP_TITLE =
    "Paint SOP";

// ========================================
// ELEMENTS
// ========================================

const sopEditor =
    document.getElementById(
        "sopEditor"
    );

const editBtn =
    document.getElementById(
        "editBtn"
    );

const linkBtn =
    document.getElementById(
        "linkBtn"
    );

const lastUpdated =
    document.getElementById(
        "lastUpdated"
    );

const saveIndicator =
    document.getElementById(
        "saveIndicator"
    );

let isEditing =
    false;

let saveTimeout =
    null;

// ========================================
// LOAD SOP
// ========================================

async function loadSOP(){

    let {
        data
    } = await supabaseClient
        .from("sops")
        .select("*")
        .eq(
            "slug",
            SOP_SLUG
        )
        .single();

    // create if missing

    if(!data){

        const result =
            await supabaseClient
                .from("sops")
                .insert([{

                    slug:
                        SOP_SLUG,

                    title:
                        SOP_TITLE,

                    content:
                        "",

                    updated_at:
                        Date.now()

                }])
                .select()
                .single();

        data =
            result.data;

    }

    sopEditor.innerHTML =
        data.content || "";

    updateTimestamp(
        data.updated_at
    );

}

// ========================================
// FORMAT
// ========================================

function formatDoc(
    command,
    value = null
){

    document.execCommand(
        command,
        false,
        value
    );

}

// ========================================
// LINKS
// ========================================

linkBtn.onclick =
    () => {

        const url =
            prompt(
                "Enter URL"
            );

        if(!url) return;

        document.execCommand(
            "createLink",
            false,
            url
        );

        document
            .querySelectorAll(
                "#sopEditor a"
            )
            .forEach(link => {

                link.target =
                    "_blank";

                link.rel =
                    "noopener noreferrer";

            });

    };

// ========================================
// AUTO LINK URLs
// ========================================

function autoLinkContent(){

    const urlRegex =
        /(https?:\/\/[^\s]+)/g;

    sopEditor.innerHTML =
        sopEditor.innerHTML.replace(
            urlRegex,
            url => {

                if(
                    url.includes("href=")
                ){
                    return url;
                }

                return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;

            }
        );

}

// ========================================
// SAVE SOP
// ========================================

async function saveSOP(){

    autoLinkContent();

    saveIndicator.textContent =
        "Saving...";

    await supabaseClient
        .from("sops")
        .update({

            content:
                sopEditor.innerHTML,

            updated_at:
                Date.now()

        })
        .eq(
            "slug",
            SOP_SLUG
        );

    const now =
        Date.now();

    updateTimestamp(now);

    saveIndicator.textContent =
        "Saved";

    setTimeout(() => {

        saveIndicator.textContent =
            "";

    }, 1200);

}

// ========================================
// TIMESTAMP
// ========================================

function updateTimestamp(
    timestamp
){

    const formatted =
        new Date(timestamp)
        .toLocaleString(
            [],
            {
                month:"short",
                day:"numeric",
                hour:"numeric",
                minute:"2-digit"
            }
        );

    lastUpdated.textContent =
        `Last updated: ${formatted}`;

}

// ========================================
// AUTOSAVE
// ========================================

sopEditor.addEventListener(
    "input",
    () => {

        if(!isEditing) return;

        clearTimeout(
            saveTimeout
        );

        saveTimeout =
            setTimeout(
                saveSOP,
                900
            );

    }
);

// ========================================
// TOGGLE EDIT
// ========================================

editBtn.onclick =
    () => {

        isEditing =
            !isEditing;

        sopEditor.contentEditable =
            isEditing;

        sopEditor.classList.toggle(
            "editing",
            isEditing
        );

        editBtn.textContent =
            isEditing
            ? "Editing"
            : "Edit";

    };

// ========================================
// CMD + S
// ========================================

document.addEventListener(
    "keydown",
    event => {

        if(
            (
                event.metaKey ||
                event.ctrlKey
            )
            &&
            event.key === "s"
        ){

            event.preventDefault();

            if(isEditing){

                saveSOP();

            }

        }

    }
);

// ========================================
// START
// ========================================

loadSOP();

</script>

</body>
</html>
