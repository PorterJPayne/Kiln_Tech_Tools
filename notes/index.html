<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;

    font-family:Inter,Arial,sans-serif;

    background:#c8b59c;

    color:#2f2419;
}

.notes-app{
    display:flex;

    width:100%;
    height:100%;

    overflow:hidden;

    background:#c8b59c;
}

/* SIDEBAR */

.notes-sidebar{
    width:320px;
    min-width:320px;

    border-right:1px solid rgba(70,50,30,0.12);

    display:flex;
    flex-direction:column;

    background:#bca88e;
}

.notes-header{
    padding:22px;

    border-bottom:1px solid rgba(70,50,30,0.12);
}

.notes-header h2{
    font-size:24px;
    margin-bottom:14px;
}

.new-note-btn{
    width:100%;

    border:none;

    background:#7b5b42;

    color:white;

    padding:12px;

    border-radius:12px;

    cursor:pointer;

    font-size:14px;
    font-weight:600;

    transition:.15s;
}

.new-note-btn:hover{
    background:#8b694d;
}

.notes-search{
    margin:16px;

    padding:12px 14px;

    border-radius:12px;

    border:none;

    background:rgba(255,255,255,0.35);

    color:#2f2419;

    outline:none;

    font-size:14px;
}

.note-list{
    flex:1;

    overflow-y:auto;

    padding:0 12px 12px;
}

.note-item{
    padding:14px;

    border-radius:14px;

    margin-bottom:8px;

    cursor:pointer;

    transition:.15s;

    border:1px solid transparent;
}

.note-item:hover{
    background:rgba(255,255,255,0.22);
}

.note-item.active{
    background:rgba(255,255,255,0.34);

    border-color:rgba(70,50,30,0.12);
}

.note-item-title{
    font-size:15px;
    font-weight:600;
}

/* MAIN */

.notes-main{
    flex:1;

    display:flex;

    flex-direction:column;

    overflow:hidden;

    background:#d6c3aa;
}

/* TITLE */

.note-topbar{
    padding:20px 24px;

    border-bottom:1px solid rgba(70,50,30,0.12);
}

.title-input{
    width:100%;

    background:none;

    border:none;

    outline:none;

    color:#2f2419;

    font-size:34px;

    font-weight:700;
}

/* TOOLBAR */

.toolbar{
    display:flex;

    align-items:center;

    gap:10px;

    padding:12px 18px;

    border-bottom:1px solid rgba(70,50,30,0.12);

    background:#ccb79d;

    flex-wrap:wrap;
}

.toolbar button{
    border:none;

    background:rgba(255,255,255,0.4);

    color:#2f2419;

    padding:10px 14px;

    border-radius:10px;

    cursor:pointer;

    font-size:14px;

    font-weight:600;

    transition:.15s;
}

.toolbar button:hover{
    background:white;
}

/* EDITOR */

.note-editor{
    flex:1;

    overflow-y:auto;

    padding:32px;

    line-height:1.9;

    font-size:16px;

    outline:none;

    white-space:pre-wrap;
}

.note-editor:empty:before{
    content:"Start typing...";
    color:rgba(47,36,25,0.4);
}

.note-editor a{
    color:#6a4d36;
}

/* HEADINGS */

.note-editor h1{
    font-size:42px;
    margin:18px 0;
}

.note-editor h2{
    font-size:30px;
    margin:16px 0;
}

.note-editor h3{
    font-size:22px;
    margin:14px 0;
}

/* CHECKLISTS */

.checklist{
    list-style:none;
    padding-left:0;
}

.checklist li{
    display:flex;
    align-items:flex-start;
    gap:12px;
    margin-bottom:10px;
}

.checklist input[type="checkbox"]{
    appearance:none;

    width:20px;
    height:20px;

    border-radius:50%;

    border:2px solid #7b5b42;

    margin-top:4px;

    cursor:pointer;

    background:white;

    flex-shrink:0;
}

.checklist input[type="checkbox"]:checked{
    background:#7b5b42;
}

/* SCROLLBAR */

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-track{
    background:transparent;
}

::-webkit-scrollbar-thumb{
    background:rgba(70,50,30,0.18);
    border-radius:20px;
}

</style>
</head>

<body>

<div class="notes-app">

    <div class="notes-sidebar">

        <div class="notes-header">

            <h2>Kiln Notes</h2>

            <button 
                class="new-note-btn"
                onclick="createNewNote()"
            >
                + New Note
            </button>

        </div>

        <input 
            type="text"
            id="searchInput"
            class="notes-search"
            placeholder="Search notes..."
        >

        <div id="noteList" class="note-list"></div>

    </div>

    <div class="notes-main">

        <div class="note-topbar">

            <input
                type="text"
                id="titleInput"
                class="title-input"
                placeholder="Untitled Note"
            >

        </div>

        <div class="toolbar">

            <button onclick="formatBlock('p')">
                Text
            </button>

            <button onclick="formatBlock('h3')">
                Subheading
            </button>

            <button onclick="formatBlock('h2')">
                Heading
            </button>

            <button onclick="formatBlock('h1')">
                Title
            </button>

            <button onclick="insertChecklist()">
                Checklist
            </button>

        </div>

        <div
            id="editor"
            class="note-editor"
            contenteditable="true"
            spellcheck="true"
        ></div>

    </div>

</div>

<script>

let notes = JSON.parse(
    localStorage.getItem("kilnNotes")
) || [];

let currentNoteId = null;

const editor = document.getElementById("editor");
const noteList = document.getElementById("noteList");
const titleInput = document.getElementById("titleInput");
const searchInput = document.getElementById("searchInput");

function createNewNote(){

    const note = {

        id: Date.now(),

        title: "Untitled Note",

        content: "",

        created: new Date().toISOString()

    };

    notes.unshift(note);

    currentNoteId = note.id;

    renderNotes();

    loadNote(note.id);

    saveNotes();

}

function renderNotes(filter = ""){

    noteList.innerHTML = "";

    const filtered = notes.filter(note => {

        return (

            note.title
                .toLowerCase()
                .includes(filter.toLowerCase())

            ||

            note.content
                .toLowerCase()
                .includes(filter.toLowerCase())

        );

    });

    filtered.forEach(note => {

        const div = document.createElement("div");

        div.className = "note-item";

        if(note.id === currentNoteId){

            div.classList.add("active");

        }

        div.innerHTML = `
            <div class="note-item-title">
                ${note.title}
            </div>
        `;

        div.onclick = () => {

            loadNote(note.id);

        };

        noteList.appendChild(div);

    });

}

function loadNote(id){

    const note = notes.find(n => n.id === id);

    if(!note) return;

    currentNoteId = id;

    titleInput.value = note.title;

    editor.innerHTML = note.content;

    renderNotes(searchInput.value);

}

function saveCurrentNote(){

    if(currentNoteId === null) return;

    const note = notes.find(n => n.id === currentNoteId);

    if(!note) return;

    note.title = titleInput.value || "Untitled Note";

    note.content = editor.innerHTML;

    saveNotes();

    renderNotes(searchInput.value);

}

function saveNotes(){

    localStorage.setItem(
        "kilnNotes",
        JSON.stringify(notes)
    );

}

function formatBlock(tag){

    document.execCommand(
        "formatBlock",
        false,
        tag
    );

}

function insertChecklist(){

    const checklistHTML = `

        <ul class="checklist">

            <li>
                <input type="checkbox">
                <span contenteditable="true">
                    Checklist item
                </span>
            </li>

        </ul>

    `;

    document.execCommand(
        "insertHTML",
        false,
        checklistHTML
    );

}

searchInput.addEventListener("input", e => {

    renderNotes(e.target.value);

});

editor.addEventListener(
    "input",
    saveCurrentNote
);

titleInput.addEventListener(
    "input",
    saveCurrentNote
);

editor.addEventListener("paste", function(e){

    e.preventDefault();

    const text = (
        e.clipboardData ||
        window.clipboardData
    ).getData("text");

    const urlRegex = /(https?:\/\/[^\s]+)/g;

    const html = text.replace(
        urlRegex,
        url => `
            <a href="${url}" target="_blank">
                ${url}
            </a>
        `
    );

    document.execCommand(
        "insertHTML",
        false,
        html
    );

});

if(notes.length === 0){

    createNewNote();

} else {

    renderNotes();

    loadNote(notes[0].id);

}

</script>

</body>
</html>
