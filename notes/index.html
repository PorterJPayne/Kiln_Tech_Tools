<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Kiln Notes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/core/platform1.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/core/api/notes-api.js"></script>

<script src="/core/api/search-api.js"></script>

<script src="/core/layout.js" defer></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    font-family:Inter,Arial,sans-serif;
    background:#ddd2c2;
    color:var(--text);
}

button,
input{
    font-family:inherit;
}

.notes-app{
    display:flex;
    width:100%;
    height:100vh;
    overflow:hidden;
}

/* SIDEBAR */

.notes-sidebar{
    width:320px;
    min-width:320px;
    background:var(--panel);
    border-right:1px solid rgba(70,50,30,0.08);
    display:flex;
    flex-direction:column;
}

.notes-header{
    padding:20px;
    border-bottom:1px solid rgba(70,50,30,0.08);
}

.notes-header h2{
    font-size:22px;
    margin-bottom:12px;
}

.new-note-btn{
    width:100%;
    border:none;
   background:var(--accent);
    color:white;
    padding:11px;
    border-radius:var(--radius-md);
    cursor:pointer;
    font-size:14px;
    font-weight:600;
}

.notes-search{
    margin:14px;
    padding:11px 13px;
    border:none;
    border-radius:12px;
    outline:none;
    background:rgba(255,255,255,0.45);
}

.note-list{
    flex:1;
    overflow-y:auto;
    padding:0 10px 10px;
}

.note-item{
    padding:12px;
    border-radius:12px;
    margin-bottom:6px;
    cursor:pointer;
    border:1px solid transparent;
    position:relative;
}

.note-item:hover{
    background:rgba(255,255,255,0.25);
}

.note-item.active{
    background:rgba(255,255,255,0.45);
    border-color:rgba(70,50,30,0.08);
}

.note-item-title{
    font-size:14px;
    font-weight:600;
    margin-bottom:4px;
}

.note-meta{
    font-size:11px;
    opacity:.6;
}

.pin-indicator{
    position:absolute;
    top:10px;
    right:10px;
    font-size:11px;
}

/* MAIN */

.notes-main{
    flex:1;
    display:flex;
    flex-direction:column;
    overflow:hidden;
   background:var(--panel-light);
}

/* TOPBAR */

.note-topbar{
    padding:18px 22px;
    border-bottom:1px solid rgba(70,50,30,0.08);
    display:flex;
    align-items:center;
    gap:10px;
}

.title-input{
    flex:1;
    background:none;
    border:none;
    outline:none;
    font-size:30px;
    font-weight:700;
    color:#2f2419;
}

.topbar-actions{
    display:flex;
    gap:8px;
}

.icon-btn{
    border:none;
    width:40px;
    height:40px;
    border-radius:10px;
    cursor:pointer;
    background:rgba(255,255,255,0.5);
}

/* TOOLBAR */

.toolbar{
    position:relative;
    padding:10px 16px;
    border-bottom:1px solid rgba(70,50,30,0.08);
    background:#ded4c7;
    display:flex;
    align-items:center;
    gap:8px;
}

.format-button{
    border:none;
    width:38px;
    height:38px;
    border-radius:10px;
    background:rgba(255,255,255,0.55);
    cursor:pointer;
    font-size:15px;
    font-weight:700;
}

.format-button:hover{
    background:white;
}

/* FORMAT MENU */

.format-menu{
    position:absolute;
    top:54px;
    left:16px;
    display:none;
    flex-direction:column;
    background:#f4ede4;
    border:1px solid rgba(70,50,30,0.08);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
    z-index:100;
}

.format-menu.show{
    display:flex;
}

.format-menu button{
    border:none;
    background:none;
    padding:12px 16px;
    text-align:left;
    cursor:pointer;
    color:#3f3126;
    font-size:14px;
}

.format-menu button:hover{
    background:rgba(0,0,0,0.04);
}

/* LINK POPUP */

.link-popup{
    position:absolute;
    top:56px;
    right:16px;
    display:none;
    align-items:center;
    gap:8px;
    padding:12px;
    border-radius:14px;
    background:#f4ede4;
    border:1px solid rgba(70,50,30,0.08);
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
    z-index:500;
}

.link-popup.show{
    display:flex;
}

.link-popup input{
    width:240px;
    padding:10px 12px;
    border:none;
    border-radius:10px;
    outline:none;
}

.link-popup button{
    border:none;
    background:#8b735d;
    color:white;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

/* EDITOR */

.note-editor{
    flex:1;
    overflow-y:auto;
    padding:24px 28px;
    line-height:1.45;
    font-size:15px;
    outline:none;
}

.note-editor:empty:before{
    content:"Start typing...";
    color:rgba(47,36,25,0.4);
}

/* TEXT */

.note-editor h1{
    font-size:34px;
    margin:10px 0;
}

.note-editor h2{
    font-size:26px;
    margin:8px 0;
}

.note-editor h3{
    font-size:20px;
    margin:6px 0;
}

.note-editor p{
    margin:3px 0;
}

/* LINKS */

.note-editor a{
    color:#7a4f2b;
    text-decoration:underline;
    text-decoration-thickness:2px;
    font-weight:500;
    cursor:pointer;
}

.note-editor a:hover{
    color:#9a6235;
}

/* CHECKLIST */

.checklist-item{
    display:flex;
    align-items:flex-start;
    gap:10px;
    margin:4px 0;
}

.checklist-checkbox{
    width:18px;
    height:18px;
    border-radius:50%;
    border:2px solid #8b735d;
    margin-top:2px;
    flex-shrink:0;
    cursor:pointer;
    background:white;
}

.checklist-checkbox.checked{
    background:#8b735d;
}

.checklist-text{
    flex:1;
    min-height:20px;
    outline:none;
}

.checklist-text.checked{
    text-decoration:line-through;
    opacity:.6;
}

/* LISTS */

.note-editor ul{
    padding-left:24px;
    margin:2px 0;
}

.note-editor li{
    margin:2px 0;
}

/* SCROLLBAR */

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-thumb{
    background:rgba(70,50,30,0.18);
    border-radius:20px;
}

</style>
</head>

<body>

<div class="notes-app">

    <div class="notes-sidebar">

        <div class="notes-header">

            <h2>Kiln Notes</h2>

            <button
                class="new-note-btn"
                onclick="createNewNote()"
            >
                + New Note
            </button>

        </div>

        <input
            id="searchInput"
            class="notes-search"
            placeholder="Search notes..."
        >

        <div
            id="noteList"
            class="note-list"
        ></div>

    </div>

    <div class="notes-main">

        <div class="note-topbar">

            <input
                id="titleInput"
                class="title-input"
                placeholder="Untitled Note"
            >

            <div class="topbar-actions">

                <button
                    class="icon-btn"
                    onclick="togglePin()"
                >
                    📌
                </button>

                <button
                    class="icon-btn"
                    onclick="deleteNote()"
                >
                    🗑️
                </button>

            </div>

        </div>

        <div class="toolbar">

            <button
                class="format-button"
                onclick="toggleFormatMenu()"
            >
                Aa
            </button>

            <button
                class="format-button"
                onclick="document.execCommand('bold')"
            >
                B
            </button>

            <button
                class="format-button"
                onclick="document.execCommand('italic')"
            >
                I
            </button>

            <button
                class="format-button"
                onclick="document.execCommand('underline')"
            >
                U
            </button>

            <button
                class="format-button"
                onclick="document.execCommand('strikeThrough')"
            >
                S
            </button>

            <button
                class="format-button"
                onclick="openLinkPopup()"
            >
                🔗
            </button>

            <button
                class="format-button"
                onclick="insertChecklist()"
            >
                ✓
            </button>

            <!-- FORMAT MENU -->

            <div
                class="format-menu"
                id="formatMenu"
            >

                <button onclick="formatBlock('p')">
                    Text
                </button>

                <button onclick="formatBlock('h3')">
                    Subheading
                </button>

                <button onclick="formatBlock('h2')">
                    Heading
                </button>

                <button onclick="formatBlock('h1')">
                    Title
                </button>

            </div>

            <!-- LINK POPUP -->

            <div
                class="link-popup"
                id="linkPopup"
            >

                <input
                    id="linkInput"
                    placeholder="Paste URL..."
                >

                <button onclick="applyLink()">
                    Add
                </button>

            </div>

        </div>

        <div
            id="editor"
            class="note-editor"
            contenteditable="true"
            spellcheck="true"
        ></div>

    </div>

</div>



<script>

const editor = document.getElementById("editor");
const noteList = document.getElementById("noteList");
const titleInput = document.getElementById("titleInput");
const searchInput = document.getElementById("searchInput");
const linkPopup = document.getElementById("linkPopup");
const linkInput = document.getElementById("linkInput");


let notes = [];

let currentNoteId = null;
let savedSelection = null;
let saveTimeout = null;

/* NOTES */

function createNewNote(){

    const note = {

        id: Date.now(),
        title:"Untitled Note",
        content:"",
        pinned:false,
        updatedAt:Date.now()

    };

    notes.unshift(note);

    currentNoteId = note.id;

    renderNotes();

    loadNote(note.id);

    saveNotes();

}

function renderNotes(filter = ""){

    notes.sort((a,b) => {

        if(a.pinned !== b.pinned){
            return b.pinned - a.pinned;
        }

        return b.updatedAt - a.updatedAt;

    });

    noteList.innerHTML = "";

    notes
        .filter(note => {

            return (
                note.title
                    .toLowerCase()
                    .includes(filter.toLowerCase())

                ||

                note.content
                    .toLowerCase()
                    .includes(filter.toLowerCase())
            );

        })
        .forEach(note => {

            const div =
                document.createElement("div");

            div.className =
                "note-item";

            if(note.id === currentNoteId){
                div.classList.add("active");
            }

            div.innerHTML = `

                <div class="note-item-title">
                    ${note.title}
                </div>

                <div class="note-meta">
                    ${new Date(note.updatedAt)
                        .toLocaleDateString()}
                </div>

                ${
                    note.pinned
                    ? '<div class="pin-indicator">📌</div>'
                    : ''
                }

            `;

            div.onclick =
                () => loadNote(note.id);

            noteList.appendChild(div);

        });

}

function loadNote(id){

    const note =
        notes.find(n => n.id === id);

    if(!note) return;

    currentNoteId = id;

    titleInput.value =
        note.title;

    editor.innerHTML =
        note.content;

    renderNotes(searchInput.value);

}

function saveCurrentNote(){

    if(currentNoteId === null) return;

    const note =
        notes.find(
            n => n.id === currentNoteId
        );

    if(!note) return;

    note.title =
        titleInput.value || "Untitled Note";

    note.content =
        editor.innerHTML;

    note.updatedAt =
        Date.now();

    renderNotes(searchInput.value);

    clearTimeout(saveTimeout);

    saveTimeout = setTimeout(() => {

        saveNote(note);

    }, 1000);

}



/* FORMAT */

function toggleFormatMenu(){

    document
        .getElementById("formatMenu")
        .classList
        .toggle("show");

}

function formatBlock(tag){

    document.execCommand(
        "formatBlock",
        false,
        tag
    );

    saveCurrentNote();

}

/* PIN */

function togglePin(){

    const note =
        notes.find(
            n => n.id === currentNoteId
        );

    if(!note) return;

    note.pinned = !note.pinned;

    saveCurrentNote();

}

/* DELETE */

function deleteNote(){

    notes =
        notes.filter(
            n => n.id !== currentNoteId
        );

    if(notes.length){

        loadNote(notes[0].id);

    } else {

        createNewNote();

    }

    deleteNoteFromDB(currentNoteId);

}

/* CHECKLIST */

function createChecklistRow(textValue=""){

    const checklist =
        document.createElement("div");

    checklist.className =
        "checklist-item";

    const checkbox =
        document.createElement("div");

    checkbox.className =
        "checklist-checkbox";

    const text =
        document.createElement("div");

    text.className =
        "checklist-text";

    text.contentEditable = true;

    text.innerText = textValue;

    checkbox.onclick = () => {

        checkbox.classList.toggle("checked");

        text.classList.toggle("checked");

        saveCurrentNote();

    };

    checklist.appendChild(checkbox);

    checklist.appendChild(text);

    return {
        checklist,
        text
    };

}

function insertChecklist(){

    const selection =
        window.getSelection();

    if(!selection.rangeCount) return;

    const selectedText =
        selection.toString();

    const {
        checklist,
        text
    } = createChecklistRow(selectedText);

    const range =
        selection.getRangeAt(0);

    range.deleteContents();

    range.insertNode(checklist);

    placeCaretAtEnd(text);

    saveCurrentNote();

}

/* CARET */

function placeCaretAtEnd(el){

    el.focus();

    const range =
        document.createRange();

    range.selectNodeContents(el);

    range.collapse(false);

    const sel =
        window.getSelection();

    sel.removeAllRanges();

    sel.addRange(range);

}

/* LINK SYSTEM */

function openLinkPopup(){

    const selection =
        window.getSelection();

    if(selection.rangeCount){

        savedSelection =
            selection.getRangeAt(0);

    }

    linkPopup.classList.toggle("show");

    setTimeout(() => {

        linkInput.focus();

    }, 10);

}

function applyLink(){

    let url =
        linkInput.value.trim();

    if(!url) return;

    if(
        !url.startsWith("http://") &&
        !url.startsWith("https://")
    ){
        url = "https://" + url;
    }

    editor.focus();

    const selection =
        window.getSelection();

    selection.removeAllRanges();

    selection.addRange(savedSelection);

    document.execCommand(
        "createLink",
        false,
        url
    );

    editor
        .querySelectorAll("a")
        .forEach(link => {

            link.target = "_blank";

            link.rel =
                "noopener noreferrer";

        });

    linkPopup.classList.remove("show");

    linkInput.value = "";

    saveCurrentNote();

}

linkInput.addEventListener("keydown", function(e){

    if(e.key === "Enter"){

        applyLink();

    }

});

/* PASTE */

editor.addEventListener("paste", function(e){

    e.preventDefault();

    const html =
        e.clipboardData.getData("text/html");

    const text =
        e.clipboardData.getData("text/plain");

    if(html){

        document.execCommand(
            "insertHTML",
            false,
            html
        );

    } else {

        const linked =
            text.replace(
                /(https?:\/\/[^\s]+)/g,
                url => `
                    <a
                        href="${url}"
                        target="_blank"
                        rel="noopener noreferrer"
                    >
                        ${url}
                    </a>
                `
            );

        document.execCommand(
            "insertHTML",
            false,
            linked
        );

    }

    saveCurrentNote();

});

/* OPEN LINKS */

editor.addEventListener("click", function(e){

    const link =
        e.target.closest("a");

    if(link){

        e.preventDefault();

        window.open(
            link.href,
            "_blank"
        );

    }

});

/* KEYBOARD BEHAVIOR */

editor.addEventListener("keydown", function(e){

    const selection =
        window.getSelection();

    if(!selection.rangeCount) return;

    let checklistNode =
        selection.anchorNode;

    while(
        checklistNode &&
        checklistNode !== editor &&
        !checklistNode.classList?.contains("checklist-text")
    ){
        checklistNode =
            checklistNode.parentNode;
    }

    /* CHECKLIST ENTER */

    if(
        e.key === "Enter" &&
        checklistNode &&
        checklistNode.classList?.contains("checklist-text")
    ){

        e.preventDefault();

        const currentChecklist =
            checklistNode.parentNode;

        if(
            checklistNode.innerText.trim() === ""
        ){

            const p =
                document.createElement("p");

            p.innerHTML = "<br>";

            currentChecklist.replaceWith(p);

            placeCaretAtEnd(p);

            saveCurrentNote();

            return;

        }

        const {
            checklist,
            text
        } = createChecklistRow("");

        currentChecklist.insertAdjacentElement(
            "afterend",
            checklist
        );

        placeCaretAtEnd(text);

        saveCurrentNote();

        return;

    }

    /* CHECKLIST BACKSPACE */

    if(
        e.key === "Backspace" &&
        checklistNode &&
        checklistNode.classList?.contains("checklist-text")
    ){

        if(
            checklistNode.innerText.trim() === ""
        ){

            e.preventDefault();

            const checklist =
                checklistNode.parentNode;

            const p =
                document.createElement("p");

            p.innerHTML = "<br>";

            checklist.replaceWith(p);

            placeCaretAtEnd(p);

            saveCurrentNote();

            return;

        }

    }

    /* DASH SPACE BULLETS */

    if(e.key === " "){

        const range =
            selection.getRangeAt(0);

        const currentText =
            range.startContainer.textContent;

        if(currentText === "-"){

            e.preventDefault();

            range.startContainer.textContent = "";

            const ul =
                document.createElement("ul");

            const li =
                document.createElement("li");

            li.innerHTML = "<br>";

            ul.appendChild(li);

            range.insertNode(ul);

            placeCaretAtEnd(li);

            saveCurrentNote();

            return;

        }

    }

    /* TAB INDENT */

    if(e.key === "Tab"){

        let li =
            selection.anchorNode;

        while(
            li &&
            li !== editor &&
            li.nodeName !== "LI"
        ){
            li = li.parentNode;
        }

        if(li && li.nodeName === "LI"){

            e.preventDefault();

            if(!e.shiftKey){

                const prevLi =
                    li.previousElementSibling;

                if(prevLi){

                    let nested =
                        prevLi.querySelector(":scope > ul");

                    if(!nested){

                        nested =
                            document.createElement("ul");

                        prevLi.appendChild(nested);

                    }

                    nested.appendChild(li);

                }

            }

            else {

                const parentUl =
                    li.parentElement;

                const parentLi =
                    parentUl.closest("li");

                if(parentLi){

                    parentLi.after(li);

                    if(
                        parentUl.children.length === 0
                    ){
                        parentUl.remove();
                    }

                }

            }

            saveCurrentNote();

            return;

        }

    }

});

/* CLOSE MENUS */

document.addEventListener("click", function(e){

    const formatMenu =
        document.getElementById("formatMenu");

    if(
        formatMenu &&
        !e.target.closest(".toolbar")
    ){
        formatMenu.classList.remove("show");
    }

});

/* SAVE */

editor.addEventListener(
    "input",
    saveCurrentNote
);

titleInput.addEventListener(
    "input",
    saveCurrentNote
);

searchInput.addEventListener(
    "input",
    e => renderNotes(e.target.value)
);




/* INIT */

async function initNotes(){

    notes = await fetchNotes();

    notes = notes.map(note => ({

        id: note.id,
        title: note.title,
        content: note.content,
        pinned: note.pinned,
        updatedAt: note.updated_at

    }));

    if(notes.length === 0){

        createNewNote();

    } else {

        renderNotes();

        loadNote(notes[0].id);

    }

}

initNotes();

</script>

</body>
</html>
