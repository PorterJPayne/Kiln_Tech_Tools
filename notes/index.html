<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Inter,Arial,sans-serif;
    background:#ddd2c2;
    color:#2f2419;
}

button{
    font-family:inherit;
}

.notes-app{
    display:flex;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#ddd2c2;
}

/* SIDEBAR */

.notes-sidebar{
    width:320px;
    min-width:320px;
    border-right:1px solid rgba(70,50,30,0.08);
    display:flex;
    flex-direction:column;
    background:#d2c5b4;
}

.notes-header{
    padding:20px;
    border-bottom:1px solid rgba(70,50,30,0.08);
}

.notes-header h2{
    font-size:22px;
    margin-bottom:12px;
}

.new-note-btn{
    width:100%;
    border:none;
    background:#8b735d;
    color:white;
    padding:11px;
    border-radius:12px;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
}

.notes-search{
    margin:14px;
    padding:11px 13px;
    border-radius:12px;
    border:none;
    background:rgba(255,255,255,0.4);
    color:#2f2419;
    outline:none;
}

.note-list{
    flex:1;
    overflow-y:auto;
    padding:0 10px 10px;
}

.note-item{
    padding:12px;
    border-radius:12px;
    margin-bottom:6px;
    cursor:pointer;
    border:1px solid transparent;
    position:relative;
}

.note-item:hover{
    background:rgba(255,255,255,0.25);
}

.note-item.active{
    background:rgba(255,255,255,0.45);
    border-color:rgba(70,50,30,0.08);
}

.note-item-title{
    font-size:14px;
    font-weight:600;
    margin-bottom:4px;
}

.note-meta{
    font-size:11px;
    opacity:.6;
}

.pin-indicator{
    position:absolute;
    top:10px;
    right:10px;
    font-size:11px;
}

/* MAIN */

.notes-main{
    flex:1;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    background:#e7ddd0;
}

/* TITLE */

.note-topbar{
    padding:18px 22px;
    border-bottom:1px solid rgba(70,50,30,0.08);
    display:flex;
    align-items:center;
    gap:10px;
}

.title-input{
    flex:1;
    background:none;
    border:none;
    outline:none;
    color:#2f2419;
    font-size:30px;
    font-weight:700;
}

.topbar-actions{
    display:flex;
    gap:8px;
}

.icon-btn{
    border:none;
    background:rgba(255,255,255,0.5);
    width:40px;
    height:40px;
    border-radius:10px;
    cursor:pointer;
}

/* TOOLBAR */

.toolbar{
    position:relative;
    padding:10px 16px;
    border-bottom:1px solid rgba(70,50,30,0.08);
    background:#ded4c7;
    display:flex;
    align-items:center;
    gap:8px;
}

.format-button{
    border:none;
    background:rgba(255,255,255,0.55);
    color:#4a3a2d;
    width:38px;
    height:38px;
    border-radius:10px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
}

.format-button:hover{
    background:white;
}

.format-menu{
    position:absolute;
    top:54px;
    left:16px;
    display:none;
    flex-direction:column;
    background:#f4ede4;
    border:1px solid rgba(70,50,30,0.08);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
    z-index:100;
}

.format-menu.show{
    display:flex;
}

.format-menu button{
    border:none;
    background:none;
    padding:12px 16px;
    text-align:left;
    cursor:pointer;
    color:#3f3126;
    font-size:14px;
}

.format-menu button:hover{
    background:rgba(0,0,0,0.04);
}

/* EDITOR */

.note-editor{
    flex:1;
    overflow-y:auto;
    padding:24px 28px;
    line-height:1.45;
    font-size:15px;
    outline:none;
}

.note-editor:empty:before{
    content:"Start typing...";
    color:rgba(47,36,25,0.4);
}

/* TEXT */

.note-editor h1{
    font-size:34px;
    margin:10px 0;
}

.note-editor h2{
    font-size:26px;
    margin:8px 0;
}

.note-editor h3{
    font-size:20px;
    margin:6px 0;
}

.note-editor p{
    margin:3px 0;
}

.note-editor a{
    color:#6a4d36;
    text-decoration:underline;
    cursor:pointer;
}

/* CHECKLIST */

.checklist-item{
    display:flex;
    align-items:flex-start;
    gap:10px;
    margin:4px 0;
}

.checklist-checkbox{
    width:18px;
    height:18px;
    border-radius:50%;
    border:2px solid #8b735d;
    margin-top:2px;
    flex-shrink:0;
    cursor:pointer;
    background:white;
}

.checklist-checkbox.checked{
    background:#8b735d;
}

.checklist-text{
    flex:1;
    outline:none;
    min-height:20px;
}

.checklist-text.checked{
    text-decoration:line-through;
    opacity:.6;
}

/* LISTS */

.note-editor ul{
    padding-left:24px;
    margin:2px 0;
}

.note-editor li{
    margin:2px 0;
    line-height:1.45;
}

/* SCROLLBAR */

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-thumb{
    background:rgba(70,50,30,0.18);
    border-radius:20px;
}

</style>
</head>

<body>

<div class="notes-app">

    <div class="notes-sidebar">

        <div class="notes-header">

            <h2>Kiln Notes</h2>

            <button 
                class="new-note-btn"
                onclick="createNewNote()"
            >
                + New Note
            </button>

        </div>

        <input 
            type="text"
            id="searchInput"
            class="notes-search"
            placeholder="Search notes..."
        >

        <div id="noteList" class="note-list"></div>

    </div>

    <div class="notes-main">

        <div class="note-topbar">

            <input
                type="text"
                id="titleInput"
                class="title-input"
                placeholder="Untitled Note"
            >

            <div class="topbar-actions">

                <button 
                    class="icon-btn"
                    onclick="togglePin()"
                >
                    📌
                </button>

                <button 
                    class="icon-btn"
                    onclick="deleteNote()"
                >
                    🗑️
                </button>

            </div>

        </div>

        <div class="toolbar">

            <button 
                class="format-button"
                onclick="toggleFormatMenu()"
            >
                Aa
            </button>

            <button 
                class="format-button"
                onclick="document.execCommand('bold')"
            >
                B
            </button>

            <button 
                class="format-button"
                onclick="document.execCommand('italic')"
            >
                I
            </button>

            <button 
                class="format-button"
                onclick="document.execCommand('underline')"
            >
                U
            </button>

            <button 
                class="format-button"
                onclick="document.execCommand('strikeThrough')"
            >
                S
            </button>

            <button 
                class="format-button"
                onclick="insertChecklist()"
            >
                ✓
            </button>

            <div class="format-menu" id="formatMenu">

                <button onclick="formatBlock('p')">
                    Text
                </button>

                <button onclick="formatBlock('h3')">
                    Subheading
                </button>

                <button onclick="formatBlock('h2')">
                    Heading
                </button>

                <button onclick="formatBlock('h1')">
                    Title
                </button>

            </div>

        </div>

        <div
            id="editor"
            class="note-editor"
            contenteditable="true"
            spellcheck="true"
        ></div>

    </div>

</div>

<script>

let notes = JSON.parse(
    localStorage.getItem("kilnNotes")
) || [];

let currentNoteId = null;

const editor = document.getElementById("editor");
const noteList = document.getElementById("noteList");
const titleInput = document.getElementById("titleInput");
const searchInput = document.getElementById("searchInput");

/* CREATE */

function createNewNote(){

    const note = {

        id: Date.now(),
        title: "Untitled Note",
        content: "",
        pinned: false,
        createdAt: Date.now(),
        updatedAt: Date.now()

    };

    notes.unshift(note);

    currentNoteId = note.id;

    renderNotes();

    loadNote(note.id);

    saveNotes();

}

/* SORT */

function sortNotes(){

    notes.sort((a,b) => {

        if(a.pinned !== b.pinned){
            return b.pinned - a.pinned;
        }

        return b.updatedAt - a.updatedAt;

    });

}

/* RENDER */

function renderNotes(filter = ""){

    sortNotes();

    noteList.innerHTML = "";

    const filtered = notes.filter(note => {

        return (
            note.title.toLowerCase().includes(filter.toLowerCase())
            ||
            note.content.toLowerCase().includes(filter.toLowerCase())
        );

    });

    filtered.forEach(note => {

        const div = document.createElement("div");

        div.className = "note-item";

        if(note.id === currentNoteId){
            div.classList.add("active");
        }

        div.innerHTML = `

            <div class="note-item-title">
                ${note.title}
            </div>

            <div class="note-meta">
                ${formatDate(note.updatedAt)}
            </div>

            ${
                note.pinned
                ? '<div class="pin-indicator">📌</div>'
                : ''
            }

        `;

        div.onclick = () => loadNote(note.id);

        noteList.appendChild(div);

    });

}

/* LOAD */

function loadNote(id){

    const note = notes.find(n => n.id === id);

    if(!note) return;

    currentNoteId = id;

    titleInput.value = note.title;

    editor.innerHTML = note.content;

    renderNotes(searchInput.value);

}

/* SAVE */

function saveCurrentNote(){

    if(currentNoteId === null) return;

    const note = notes.find(
        n => n.id === currentNoteId
    );

    if(!note) return;

    note.title = titleInput.value || "Untitled Note";

    note.content = editor.innerHTML;

    note.updatedAt = Date.now();

    saveNotes();

    renderNotes(searchInput.value);

}

function saveNotes(){

    localStorage.setItem(
        "kilnNotes",
        JSON.stringify(notes)
    );

}

/* DELETE */

function deleteNote(){

    if(currentNoteId === null) return;

    const confirmed = confirm(
        "Delete this note?"
    );

    if(!confirmed) return;

    notes = notes.filter(
        n => n.id !== currentNoteId
    );

    saveNotes();

    if(notes.length > 0){

        loadNote(notes[0].id);

    } else {

        createNewNote();

    }

}

/* PIN */

function togglePin(){

    const note = notes.find(
        n => n.id === currentNoteId
    );

    if(!note) return;

    note.pinned = !note.pinned;

    note.updatedAt = Date.now();

    saveNotes();

    renderNotes(searchInput.value);

}

/* FORMAT */

function formatBlock(tag){

    document.execCommand(
        "formatBlock",
        false,
        tag
    );

}

function toggleFormatMenu(){

    document
        .getElementById("formatMenu")
        .classList
        .toggle("show");

}

document.addEventListener("click", function(e){

    const menu = document.getElementById("formatMenu");

    if(
        !e.target.closest(".toolbar")
    ){
        menu.classList.remove("show");
    }

});

/* CHECKLIST */

function createChecklistRow(textValue = ""){

    const checklist =
        document.createElement("div");

    checklist.className =
        "checklist-item";

    const checkbox =
        document.createElement("div");

    checkbox.className =
        "checklist-checkbox";

    const text =
        document.createElement("div");

    text.className =
        "checklist-text";

    text.contentEditable = true;

    text.innerText = textValue;

    checkbox.onclick = () => {

        checkbox.classList.toggle("checked");

        text.classList.toggle("checked");

        saveCurrentNote();

    };

    checklist.appendChild(checkbox);

    checklist.appendChild(text);

    return {
        checklist,
        text
    };

}

function insertChecklist(){

    const selection = window.getSelection();

    if(!selection.rangeCount) return;

    const selectedText =
        selection.toString();

    const {
        checklist,
        text
    } = createChecklistRow(selectedText);

    const range =
        selection.getRangeAt(0);

    range.deleteContents();

    range.insertNode(checklist);

    placeCaretAtEnd(text);

    saveCurrentNote();

}

/* KEYBOARD */

editor.addEventListener("keydown", function(e){

    const selection =
        window.getSelection();

    if(!selection.rangeCount) return;

    let node =
        selection.anchorNode;

    while(
        node &&
        node !== editor &&
        !node.classList?.contains("checklist-text")
    ){
        node = node.parentNode;
    }

    /* CHECKLIST ENTER */

    if(
        e.key === "Enter" &&
        node &&
        node.classList?.contains("checklist-text")
    ){

        e.preventDefault();

        const currentChecklist =
            node.parentNode;

        if(node.innerText.trim() === ""){

            const p =
                document.createElement("p");

            p.innerHTML = "<br>";

            currentChecklist.replaceWith(p);

            placeCaretAtEnd(p);

            saveCurrentNote();

            return;

        }

        const {
            checklist,
            text
        } = createChecklistRow("");

        currentChecklist.insertAdjacentElement(
            "afterend",
            checklist
        );

        placeCaretAtEnd(text);

        saveCurrentNote();

        return;

    }

    /* CHECKLIST BACKSPACE */

    if(
        e.key === "Backspace" &&
        node &&
        node.classList?.contains("checklist-text")
    ){

        if(node.innerText.trim() === ""){

            e.preventDefault();

            const checklist =
                node.parentNode;

            const p =
                document.createElement("p");

            p.innerHTML = "<br>";

            checklist.replaceWith(p);

            placeCaretAtEnd(p);

            saveCurrentNote();

        }

        return;

    }

    /* DASH SPACE LIST */

    if(e.key === " "){

        const range =
            selection.getRangeAt(0);

        const currentText =
            range.startContainer.textContent;

        if(currentText === "-"){

            e.preventDefault();

            range.startContainer.textContent = "";

            const ul =
                document.createElement("ul");

            const li =
                document.createElement("li");

            li.innerHTML = "<br>";

            ul.appendChild(li);

            range.insertNode(ul);

            placeCaretAtEnd(li);

            saveCurrentNote();

            return;

        }

    }

    /* TAB INDENT */

    if(e.key === "Tab"){

        let li = selection.anchorNode;

        while(
            li &&
            li !== editor &&
            li.nodeName !== "LI"
        ){
            li = li.parentNode;
        }

        if(li && li.nodeName === "LI"){

            e.preventDefault();

            /* INDENT */

            if(!e.shiftKey){

                const prevLi =
                    li.previousElementSibling;

                if(prevLi){

                    let nested =
                        prevLi.querySelector(":scope > ul");

                    if(!nested){

                        nested =
                            document.createElement("ul");

                        prevLi.appendChild(nested);

                    }

                    nested.appendChild(li);

                }

            }

            /* OUTDENT */

            else {

                const parentUl =
                    li.parentElement;

                const parentLi =
                    parentUl.closest("li");

                if(parentLi){

                    parentLi.after(li);

                    if(
                        parentUl.children.length === 0
                    ){
                        parentUl.remove();
                    }

                }

            }

            saveCurrentNote();

            return;

        }

    }

});

/* CARET */

function placeCaretAtEnd(el){

    el.focus();

    const range = document.createRange();

    range.selectNodeContents(el);

    range.collapse(false);

    const sel = window.getSelection();

    sel.removeAllRanges();

    sel.addRange(range);

}

/* LINKS */

editor.addEventListener("click", function(e){

    const link = e.target.closest("a");

    if(link){

        window.open(
            link.href,
            "_blank"
        );

    }

});

/* AUTO LINK PASTE */

editor.addEventListener("paste", function(e){

    e.preventDefault();

    const text = (
        e.clipboardData ||
        window.clipboardData
    ).getData("text");

    const urlRegex = /(https?:\/\/[^\s]+)/g;

    const html = text.replace(
        urlRegex,
        url => `
            <a href="${url}" target="_blank">
                ${url}
            </a>
        `
    );

    document.execCommand(
        "insertHTML",
        false,
        html
    );

});

/* EVENTS */

searchInput.addEventListener("input", e => {

    renderNotes(e.target.value);

});

editor.addEventListener(
    "input",
    saveCurrentNote
);

titleInput.addEventListener(
    "input",
    saveCurrentNote
);

/* DATE */

function formatDate(timestamp){

    const date = new Date(timestamp);

    return date.toLocaleDateString(
        undefined,
        {
            month:"short",
            day:"numeric"
        }
    );

}

/* INIT */

if(notes.length === 0){

    createNewNote();

} else {

    renderNotes();

    loadNote(notes[0].id);

}

</script>

</body>
</html>
