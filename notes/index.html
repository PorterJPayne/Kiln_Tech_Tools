<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Inter,Arial,sans-serif;
    background:#ddd2c2;
    color:#2f2419;
}

button{
    font-family:inherit;
}

.notes-app{
    display:flex;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#ddd2c2;
}

/* SIDEBAR */

.notes-sidebar{
    width:320px;
    min-width:320px;
    border-right:1px solid rgba(70,50,30,0.08);
    display:flex;
    flex-direction:column;
    background:#d2c5b4;
}

.notes-header{
    padding:20px;
    border-bottom:1px solid rgba(70,50,30,0.08);
}

.notes-header h2{
    font-size:22px;
    margin-bottom:12px;
}

.new-note-btn{
    width:100%;
    border:none;
    background:#8b735d;
    color:white;
    padding:11px;
    border-radius:12px;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
}

.notes-search{
    margin:14px;
    padding:11px 13px;
    border-radius:12px;
    border:none;
    background:rgba(255,255,255,0.4);
    color:#2f2419;
    outline:none;
}

.note-list{
    flex:1;
    overflow-y:auto;
    padding:0 10px 10px;
}

.note-item{
    padding:12px;
    border-radius:12px;
    margin-bottom:6px;
    cursor:pointer;
    border:1px solid transparent;
    position:relative;
}

.note-item:hover{
    background:rgba(255,255,255,0.25);
}

.note-item.active{
    background:rgba(255,255,255,0.45);
    border-color:rgba(70,50,30,0.08);
}

.note-item-title{
    font-size:14px;
    font-weight:600;
    margin-bottom:4px;
}

.note-meta{
    font-size:11px;
    opacity:.6;
}

.pin-indicator{
    position:absolute;
    top:10px;
    right:10px;
    font-size:11px;
}

/* MAIN */

.notes-main{
    flex:1;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    background:#e7ddd0;
}

/* TITLE */

.note-topbar{
    padding:18px 22px;
    border-bottom:1px solid rgba(70,50,30,0.08);
    display:flex;
    align-items:center;
    gap:10px;
}

.title-input{
    flex:1;
    background:none;
    border:none;
    outline:none;
    color:#2f2419;
    font-size:30px;
    font-weight:700;
}

.topbar-actions{
    display:flex;
    gap:8px;
}

.icon-btn{
    border:none;
    background:rgba(255,255,255,0.5);
    width:40px;
    height:40px;
    border-radius:10px;
    cursor:pointer;
}

/* TOOLBAR */

.toolbar{
    position:relative;
    padding:10px 16px;
    border-bottom:1px solid rgba(70,50,30,0.08);
    background:#ded4c7;
    display:flex;
    align-items:center;
    gap:8px;
}

.format-button{
    border:none;
    background:rgba(255,255,255,0.55);
    color:#4a3a2d;
    width:38px;
    height:38px;
    border-radius:10px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
}

.format-button:hover{
    background:white;
}

.format-menu{
    position:absolute;
    top:54px;
    left:16px;
    display:none;
    flex-direction:column;
    background:#f4ede4;
    border:1px solid rgba(70,50,30,0.08);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
    z-index:100;
}

.format-menu.show{
    display:flex;
}

.format-menu button{
    border:none;
    background:none;
    padding:12px 16px;
    text-align:left;
    cursor:pointer;
    color:#3f3126;
    font-size:14px;
}

.format-menu button:hover{
    background:rgba(0,0,0,0.04);
}

/* LINK POPUP */

.link-popup{

    position:absolute;

    top:60px;
    right:20px;

    display:none;

    gap:8px;

    padding:12px;

    background:#f4ede4;

    border:1px solid rgba(70,50,30,0.08);

    border-radius:14px;

    box-shadow:
        0 10px 30px rgba(0,0,0,0.12);

    z-index:200;

}

.link-popup.show{
    display:flex;
}

.link-popup input{

    width:240px;

    padding:10px 12px;

    border:none;

    border-radius:10px;

    outline:none;

    background:white;

    font-size:14px;

}

.link-popup button{

    border:none;

    background:#8b735d;

    color:white;

    padding:10px 14px;

    border-radius:10px;

    cursor:pointer;

    font-weight:600;

}

/* EDITOR */

.note-editor{
    flex:1;
    overflow-y:auto;
    padding:24px 28px;
    line-height:1.45;
    font-size:15px;
    outline:none;
}

.note-editor:empty:before{
    content:"Start typing...";
    color:rgba(47,36,25,0.4);
}

/* TEXT */

.note-editor h1{
    font-size:34px;
    margin:10px 0;
}

.note-editor h2{
    font-size:26px;
    margin:8px 0;
}

.note-editor h3{
    font-size:20px;
    margin:6px 0;
}

.note-editor p{
    margin:3px 0;
}

.note-editor a{

    color:#7a4f2b;

    text-decoration:underline;

    text-decoration-thickness:2px;

    font-weight:500;

    cursor:pointer;

}

.note-editor a:hover{

    color:#9a6235;

}

/* CHECKLIST */

.checklist-item{
    display:flex;
    align-items:flex-start;
    gap:10px;
    margin:4px 0;
}

.checklist-checkbox{
    width:18px;
    height:18px;
    border-radius:50%;
    border:2px solid #8b735d;
    margin-top:2px;
    flex-shrink:0;
    cursor:pointer;
    background:white;
}

.checklist-checkbox.checked{
    background:#8b735d;
}

.checklist-text{
    flex:1;
    outline:none;
    min-height:20px;
}

.checklist-text.checked{
    text-decoration:line-through;
    opacity:.6;
}

/* LISTS */

.note-editor ul{
    padding-left:24px;
    margin:2px 0;
}

.note-editor li{
    margin:2px 0;
    line-height:1.45;
}

/* SCROLLBAR */

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-thumb{
    background:rgba(70,50,30,0.18);
    border-radius:20px;
}

</style>
</head>

<body>

<div class="notes-app">

    <div class="notes-sidebar">

        <div class="notes-header">

            <h2>Kiln Notes</h2>

            <button 
                class="new-note-btn"
                onclick="createNewNote()"
            >
                + New Note
            </button>

        </div>

        <input 
            type="text"
            id="searchInput"
            class="notes-search"
            placeholder="Search notes..."
        >

        <div id="noteList" class="note-list"></div>

    </div>

    <div class="notes-main">

        <div class="note-topbar">

            <input
                type="text"
                id="titleInput"
                class="title-input"
                placeholder="Untitled Note"
            >

            <div class="topbar-actions">

                <button 
                    class="icon-btn"
                    onclick="togglePin()"
                >
                    📌
                </button>

                <button 
                    class="icon-btn"
                    onclick="deleteNote()"
                >
                    🗑️
                </button>

            </div>

        </div>

        <div class="toolbar">

            <button 
                class="format-button"
                onclick="toggleFormatMenu()"
            >
                Aa
            </button>

            <button 
                class="format-button"
                onclick="document.execCommand('bold')"
            >
                B
            </button>

            <button 
                class="format-button"
                onclick="document.execCommand('italic')"
            >
                I
            </button>

            <button 
                class="format-button"
                onclick="document.execCommand('underline')"
            >
                U
            </button>

            <button 
                class="format-button"
                onclick="document.execCommand('strikeThrough')"
            >
                S
            </button>

            <button 
                class="format-button"
                onclick="openLinkPrompt()"
            >
                🔗
            </button>

            <button 
                class="format-button"
                onclick="insertChecklist()"
            >
                ✓
            </button>

            <div class="format-menu" id="formatMenu">

                <button onclick="formatBlock('p')">
                    Text
                </button>

                <button onclick="formatBlock('h3')">
                    Subheading
                </button>

                <button onclick="formatBlock('h2')">
                    Heading
                </button>

                <button onclick="formatBlock('h1')">
                    Title
                </button>

            </div>

            <div class="link-popup" id="linkPopup">

                <input
                    type="text"
                    id="linkInput"
                    placeholder="Paste URL..."
                >

                <button onclick="applyLink()">
                    Add Link
                </button>

            </div>

        </div>

        <div
            id="editor"
            class="note-editor"
            contenteditable="true"
            spellcheck="true"
        ></div>

    </div>

</div>

<script>

/* LINK FUNCTIONS */

function openLinkPrompt(){

    document
        .getElementById("linkPopup")
        .classList
        .toggle("show");

}

function applyLink(){

    const input =
        document.getElementById("linkInput");

    let url =
        input.value.trim();

    if(!url) return;

    if(
        !url.startsWith("http://") &&
        !url.startsWith("https://")
    ){
        url = "https://" + url;
    }

    document.execCommand(
        "createLink",
        false,
        url
    );

    const links =
        editor.querySelectorAll("a");

    links.forEach(link => {

        link.target = "_blank";

    });

    input.value = "";

    document
        .getElementById("linkPopup")
        .classList
        .remove("show");

    saveCurrentNote();

}

document
    .getElementById("linkInput")
    .addEventListener("keydown", function(e){

        if(e.key === "Enter"){

            applyLink();

        }

});

/* PASTE HANDLER */

editor.addEventListener("paste", function(e){

    e.preventDefault();

    const html =
        e.clipboardData.getData("text/html");

    const text =
        e.clipboardData.getData("text/plain");

    if(html){

        document.execCommand(
            "insertHTML",
            false,
            html
        );

    }

    else {

        const urlRegex =
            /(https?:\/\/[^\s]+)/g;

        const linkedText =
            text.replace(
                urlRegex,
                url => `
                    <a href="${url}" target="_blank">
                        ${url}
                    </a>
                `
            );

        document.execCommand(
            "insertHTML",
            false,
            linkedText
        );

    }

    saveCurrentNote();

});

</script>

</body>
</html>
