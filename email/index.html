<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Kiln Tech Daily Update Generator</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
  --outer:#e9ddd0;
  --card:#fcfaf7;
  --sage:#7d8e71;
  --brown:#a56f45;
  --text:#2c2926;
  --muted:#766d65;
  --line:#ddd2c5;
}

*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  padding:0;
  width:100%;
  overflow-x:hidden;
}

body{
  background:var(--outer);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  padding:16px;
}

.serif{
  font-family:'Cormorant Garamond',serif;
}

input,
textarea,
select{
  transition:.18s ease;
}

input:focus,
textarea:focus,
select:focus{
  outline:none;
  border-color:var(--sage);
  box-shadow:0 0 0 3px rgba(125,142,113,.08);
}

textarea{
  resize:vertical;
}

.email-preview{
  background:var(--card);
  border:1px solid #ddd2c5;
  border-radius:12px;
  padding:40px;
  width:100%;
}

.small-label{
  font-size:10px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:#726962;
  font-weight:600;
}

.action-btn{
  transition:.18s ease;
}

.action-btn:hover{
  transform:translateY(-1px);
  opacity:.92;
}

.edit-btn{
  font-size:11px;
  padding:5px 9px;
  border-radius:6px;
  background:#ece7e0;
}

.edit-btn:hover{
  background:#dfd7cd;
}

.delete-btn{
  font-size:11px;
  padding:5px 9px;
  border-radius:6px;
  background:#f1dfdb;
}

.delete-btn:hover{
  background:#e6cbc5;
}

.main-layout{
  width:100%;
  max-width:none;
  margin:0 auto;
  display:grid;
  grid-template-columns:280px minmax(0,1fr);
  gap:20px;
  align-items:start;
}

.left-panel{
  min-width:0;
}

.preview-panel{
  min-width:0;
  width:100%;
}

@media (max-width:1200px){

  .main-layout{
    grid-template-columns:260px minmax(0,1fr);
  }

}

@media (max-width:900px){

  .main-layout{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<div class="main-layout">

  <!-- LEFT PANEL -->
  <div class="left-panel">

    <div class="mb-5">

      <h1 class="serif text-5xl leading-none mb-2">
        kiln<span class="mx-2">|</span>TECH.
      </h1>

      <div class="tracking-[0.22em] uppercase text-[10px] text-[#766d65]">
        Daily Update Generator
      </div>

    </div>

    <div class="bg-[#f7f3ee] border border-[#ddd2c5] rounded-xl p-5">

      <!-- EVERYTHING ELSE STAYS THE SAME -->

      <div class="text-sm text-[#766d65]">
        Your existing generator content continues below...
      </div>

    </div>

  </div>

  <!-- PREVIEW -->
  <div class="preview-panel">

    <div class="flex items-center justify-center gap-12 mb-4">

      <div class="flex items-center gap-3 border-b-2 border-[#7d8e71] pb-2 px-4">
        <span>◉</span>
        <span class="font-medium tracking-wide text-xs">PREVIEW</span>
      </div>

    </div>

    <div class="email-preview">

      <div id="previewContent"></div>

    </div>

  </div>

</div>

</body>
</html>
