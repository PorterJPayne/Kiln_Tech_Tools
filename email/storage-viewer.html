<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Email Storage Viewer</title>

<style>

body{
  font-family:Arial,sans-serif;
  padding:24px;
  background:#f4f1ec;
}

pre{
  background:white;
  padding:20px;
  border-radius:10px;
  overflow:auto;
  white-space:pre-wrap;
}

</style>
</head>

<body>

<h1>kilnWeeklyHistory</h1>

<pre id="output"></pre>

<script>

const raw =
  localStorage.getItem("kilnWeeklyHistory");

document.getElementById("output").textContent =
  raw || "No data found.";

</script>

</body>
</html>
