<!-- ========================= -->
<!-- TASK MODAL -->
<!-- ========================= -->

<div
    id="taskModal"
    class="modal-overlay hidden"
>

    <div class="task-modal">

        <div class="modal-title">
            Create Task
        </div>

        <div class="modal-grid">

            <input
                id="taskTicket"
                class="input"
                placeholder="Ticket #"
            >

            <input
                id="taskTitle"
                class="input"
                placeholder="Title"
            >

            <textarea
                id="taskDescription"
                class="input modal-textarea"
                placeholder="Description"
            ></textarea>

            <select
                id="taskPriority"
                class="input"
            >

                <option value="P1">
                    P1
                </option>

                <option value="P2">
                    P2
                </option>

                <option
                    value="P3"
                    selected
                >
                    P3
                </option>

                <option value="P4">
                    P4
                </option>

            </select>

            <input
                id="taskBuilding"
                class="input"
                placeholder="Building"
            >

        </div>

        <div class="modal-actions">

            <button
                id="cancelTaskBtn"
                class="button"
            >
                Cancel
            </button>

            <button
                id="saveTaskBtn"
                class="button button-primary"
            >
                Create
            </button>

        </div>

    </div>

</div>
