<!-- ========================= -->
<!-- TASK MODAL -->
<!-- ========================= -->

<div
    id="taskModal"
    class="modal-overlay hidden"
>

    <div class="task-modal">

        <div class="modal-title">
            Create Task
        </div>

        <div class="modal-grid">

            <!-- TICKET -->

            <input
                id="taskTicket"
                class="input"
                placeholder="Paste Ticket"
            >


            <!-- TITLE -->

            <input
                id="taskTitle"
                class="input"
                placeholder="Title"
            >


            <!-- DESCRIPTION -->

            <textarea
                id="taskDescription"
                class="input modal-textarea"
                placeholder="Description"
            ></textarea>


            <!-- PRIORITY -->

            <select
                id="taskPriority"
                class="input"
            >

                <option value="P1">
                    P1
                </option>

                <option value="P2">
                    P2
                </option>

                <option
                    value="P3"
                    selected
                >
                    P3
                </option>

                <option value="P4">
                    P4
                </option>

            </select>


            <!-- BUILDING -->

            <div class="building-selector">

                <button
                    class="building-pill active"
                    data-building="Lehi 1"
                    type="button"
                >
                    Lehi 1
                </button>

                <button
                    class="building-pill"
                    data-building="Lehi 2"
                    type="button"
                >
                    Lehi 2
                </button>

            </div>

        </div>

        <div class="modal-actions">

            <button
                id="cancelTaskBtn"
                class="button"
            >
                Cancel
            </button>

            <button
                id="saveTaskBtn"
                class="button button-primary"
            >
                Create
            </button>

        </div>

    </div>

</div>
