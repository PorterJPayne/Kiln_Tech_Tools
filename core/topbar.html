<div class="topbar">

    <button class="mobile-menu-btn">
        ☰
    </button>
    <div class="topbar-left">

        <h2 id="topbarTitle"></h2>

        <p id="topbarDescription"></p>

    </div>

    <div class="today-events-wrapper">

    <div
        class="today-events-pill"
        id="todayEventsPill"
    >

        <span id="todayEventsText">
            No events today
        </span>

    </div>

    <div
        class="today-events-dropdown hidden"
        id="todayEventsDropdown"
    ></div>

</div>

   <div class="topbar-right">

    <button
    id="globalTaskBtn"
    class="button button-primary"
    onclick="openTaskModal()"
>
    + Task
</button>

    <div class="search-wrapper">

        <input
            id="globalSearchInput"
            class="searchbar"
            placeholder="Search everything..."
        >

        <div
            id="globalSearchResults"
            class="search-results"
        ></div>

    </div>

</div>

</div>
