<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kiln Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../core/platform1.css">

<script>
window.sidebarPath = "./core/sidebar.html";
</script>
<script src="./core/layout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="./core/notes-api.js"></script>

</head>

<body>

<div class="app-layout">

    <!-- SIDEBAR -->

    <aside
    class="sidebar"
    id="sidebar"
></aside>

    <!-- MAIN -->

    <main class="main-content">

        <!-- TOPBAR -->

        <div class="topbar">

            <input
                class="searchbar"
                placeholder="Search everything..."
            >

            <button class="button button-primary">
                + Quick Note
            </button>

        </div>

        <!-- GRID -->

        <div class="widget-grid">

            <!-- TODAY QUEUE -->

            <div class="widget span-5">

                <h2>Today Queue</h2>

                <p>
                    This will eventually connect to
                    tickets, projects, and operational workflows.
                </p>

            </div>

            <!-- NOTES WIDGET -->

            <div class="widget span-4">

                <div
                    style="
                        display:flex;
                        justify-content:space-between;
                        align-items:center;
                        margin-bottom:16px;
                        gap:10px;
                    "
                >

                    <h2 style="margin:0;">
                        Notes
                    </h2>

                    <select
                        id="dashboardNoteSelect"
                        style="
                            background:var(--panel-light);
                            border:1px solid var(--border);
                            color:var(--text);
                            padding:10px;
                            border-radius:10px;
                        "
                    ></select>

                </div>

                <input
                    id="dashboardNoteTitle"
                    placeholder="Note title"
                    style="
                        width:100%;
                        margin-bottom:12px;
                        padding:12px;
                        border:none;
                        border-radius:12px;
                        background:var(--panel-light);
                        color:var(--text);
                    "
                >

                <textarea
                    id="dashboardNoteContent"
                    placeholder="Quick operational note..."
                    style="
                        width:100%;
                        min-height:220px;
                        resize:none;
                        border:none;
                        border-radius:12px;
                        background:var(--panel-light);
                        color:var(--text);
                        padding:14px;
                        font-family:inherit;
                    "
                ></textarea>

            </div>

            <!-- STATS -->

            <div class="widget span-3">

                <h2>Stats</h2>

                <p>
                    Weekly ticket stats will go here.
                </p>

            </div>

        </div>

    </main>

</div>

<script>

// =========================
// NOTES WIDGET
// =========================

let dashboardNotes = [];

let currentDashboardNote = null;

const noteSelect =
    document.getElementById(
        "dashboardNoteSelect"
    );

const noteTitle =
    document.getElementById(
        "dashboardNoteTitle"
    );

const noteContent =
    document.getElementById(
        "dashboardNoteContent"
    );

// =========================
// INIT
// =========================

async function initDashboardNotes(){

    dashboardNotes =
        await fetchNotes();

    renderDashboardNoteOptions();

    if(dashboardNotes.length){

        loadDashboardNote(
            dashboardNotes[0].id
        );

    }

}

// =========================
// DROPDOWN
// =========================

function renderDashboardNoteOptions(){

    noteSelect.innerHTML = "";

    dashboardNotes.forEach(note => {

        const option =
            document.createElement("option");

        option.value = note.id;

        option.textContent = note.title;

        noteSelect.appendChild(option);

    });

}

// =========================
// LOAD NOTE
// =========================

function loadDashboardNote(id){

    currentDashboardNote =
        dashboardNotes.find(
            n => n.id == id
        );

    if(!currentDashboardNote) return;

    noteSelect.value =
        currentDashboardNote.id;

    noteTitle.value =
        currentDashboardNote.title;

    noteContent.value =
        stripHtml(
            currentDashboardNote.content
        );

}

// =========================
// SAVE NOTE
// =========================

async function saveDashboardNote(){

    if(!currentDashboardNote) return;

    currentDashboardNote.title =
        noteTitle.value;

    currentDashboardNote.content =
        noteContent.value;

    currentDashboardNote.updatedAt =
        Date.now();

    await saveNote({
        id: currentDashboardNote.id,
        title: currentDashboardNote.title,
        content: currentDashboardNote.content,
        pinned: currentDashboardNote.pinned,
        updatedAt: currentDashboardNote.updatedAt
    });

}

// =========================
// STRIP HTML
// =========================

function stripHtml(html){

    const div =
        document.createElement("div");

    div.innerHTML = html;

    return div.textContent || "";

}

// =========================
// EVENTS
// =========================

noteSelect.addEventListener(
    "change",
    () => {

        loadDashboardNote(
            noteSelect.value
        );

    }
);

noteTitle.addEventListener(
    "input",
    saveDashboardNote
);

noteContent.addEventListener(
    "input",
    saveDashboardNote
);

// =========================
// START
// =========================

initDashboardNotes();

</script>

</body>
</html>
