<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kiln Notes</title>

<style>
    *{
        box-sizing:border-box;
        margin:0;
        padding:0;
    }

    body{
        font-family:Inter,Arial,sans-serif;
        background:#111827;
        color:#f3f4f6;
        height:100vh;
        display:flex;
        overflow:hidden;
    }

    .sidebar{
        width:280px;
        background:#0f172a;
        border-right:1px solid #1e293b;
        padding:20px;
        overflow-y:auto;
    }

    .logo{
        font-size:24px;
        font-weight:700;
        margin-bottom:24px;
    }

    .section{
        margin-bottom:28px;
    }

    .section-title{
        font-size:12px;
        text-transform:uppercase;
        color:#94a3b8;
        margin-bottom:10px;
        letter-spacing:1px;
    }

    .nav-item{
        padding:10px 12px;
        border-radius:10px;
        cursor:pointer;
        margin-bottom:6px;
        transition:.15s;
        color:#e2e8f0;
    }

    .nav-item:hover{
        background:#1e293b;
    }

    .nav-item.active{
        background:#2563eb;
    }

    .main{
        flex:1;
        display:flex;
        flex-direction:column;
        overflow:hidden;
    }

    .topbar{
        padding:18px 24px;
        border-bottom:1px solid #1e293b;
        background:#111827;
        display:flex;
        justify-content:space-between;
        align-items:center;
    }

    .topbar h1{
        font-size:22px;
    }

    .actions{
        display:flex;
        gap:10px;
    }

    button{
        background:#2563eb;
        border:none;
        color:white;
        padding:10px 14px;
        border-radius:10px;
        cursor:pointer;
        font-size:14px;
    }

    button:hover{
        background:#3b82f6;
    }

    .editor-wrapper{
        flex:1;
        overflow-y:auto;
        padding:24px;
    }

    #editor{
        width:100%;
        min-height:100%;
        background:#0f172a;
        border:1px solid #1e293b;
        border-radius:16px;
        padding:24px;
        outline:none;
        line-height:1.7;
        font-size:16px;
        white-space:pre-wrap;
    }

    #editor:empty:before{
        content:"Start typing...";
        color:#64748b;
    }

    .footer{
        padding:10px 20px;
        border-top:1px solid #1e293b;
        color:#94a3b8;
        font-size:13px;
    }

    a{
        color:#60a5fa;
    }

    .note-list{
        display:flex;
        flex-direction:column;
        gap:6px;
    }

    .note-item{
        background:#111827;
        border:1px solid #1e293b;
        padding:10px;
        border-radius:10px;
        cursor:pointer;
        transition:.15s;
    }

    .note-item:hover{
        border-color:#3b82f6;
    }

    .search{
        width:100%;
        margin-bottom:16px;
    }

    .search input{
        width:100%;
        padding:10px 12px;
        border-radius:10px;
        border:1px solid #1e293b;
        background:#111827;
        color:white;
    }
</style>
</head>
<body>

<div class="sidebar">

    <div class="logo">Kiln Notes</div>

    <div class="search">
        <input type="text" id="searchInput" placeholder="Search notes...">
    </div>

    <div class="section">
        <div class="section-title">Main</div>

        <div class="nav-item active" onclick="createNewNote()">
            + New Note
        </div>
    </div>

    <div class="section">
        <div class="section-title">Notes</div>

        <div class="note-list" id="noteList"></div>
    </div>

</div>

<div class="main">

    <div class="topbar">
        <h1 id="noteTitle">Untitled Note</h1>

        <div class="actions">
            <button onclick="saveNotes()">Save</button>
        </div>
    </div>

    <div class="editor-wrapper">
        <div 
            id="editor" 
            contenteditable="true"
            spellcheck="true">
        </div>
    </div>

    <div class="footer">
        Auto-saves locally in your browser
    </div>

</div>

<script>

let notes = JSON.parse(localStorage.getItem("kilnNotes")) || [];
let currentNoteId = null;

const editor = document.getElementById("editor");
const noteList = document.getElementById("noteList");
const noteTitle = document.getElementById("noteTitle");
const searchInput = document.getElementById("searchInput");

function createNewNote(){

    const note = {
        id: Date.now(),
        title: "Untitled Note",
        content: "",
        created: new Date().toISOString()
    };

    notes.unshift(note);

    currentNoteId = note.id;

    renderNotes();
    loadNote(note.id);
    saveNotes();
}

function renderNotes(filter = ""){

    noteList.innerHTML = "";

    const filtered = notes.filter(note =>
        note.title.toLowerCase().includes(filter.toLowerCase()) ||
        note.content.toLowerCase().includes(filter.toLowerCase())
    );

    filtered.forEach(note => {

        const div = document.createElement("div");
        div.className = "note-item";

        div.innerHTML = `
            <div style="font-weight:600; margin-bottom:4px;">
                ${note.title}
            </div>

            <div style="font-size:13px; color:#94a3b8;">
                ${stripHtml(note.content).substring(0,80)}
            </div>
        `;

        div.onclick = () => loadNote(note.id);

        noteList.appendChild(div);
    });
}

function loadNote(id){

    const note = notes.find(n => n.id === id);

    if(!note) return;

    currentNoteId = id;

    noteTitle.textContent = note.title;

    editor.innerHTML = note.content;
}

function saveCurrentNote(){

    if(currentNoteId === null) return;

    const note = notes.find(n => n.id === currentNoteId);

    if(!note) return;

    note.content = editor.innerHTML;

    const text = stripHtml(editor.innerHTML).trim();

    note.title = text.split("\n")[0].substring(0,40) || "Untitled Note";

    noteTitle.textContent = note.title;

    saveNotes();
    renderNotes(searchInput.value);
}

function saveNotes(){

    localStorage.setItem("kilnNotes", JSON.stringify(notes));
}

function stripHtml(html){

    const div = document.createElement("div");
    div.innerHTML = html;
    return div.textContent || div.innerText || "";
}

editor.addEventListener("input", () => {
    saveCurrentNote();
});

searchInput.addEventListener("input", (e) => {
    renderNotes(e.target.value);
});

editor.addEventListener("paste", function(e){

    e.preventDefault();

    const text = (
        e.clipboardData ||
        window.clipboardData
    ).getData("text");

    const urlRegex = /(https?:\/\/[^\s]+)/g;

    const html = text.replace(urlRegex, url => {
        return `<a href="${url}" target="_blank">${url}</a>`;
    });

    document.execCommand("insertHTML", false, html);
});

if(notes.length === 0){

    createNewNote();

} else {

    renderNotes();
    loadNote(notes[0].id);
}

</script>

</body>
</html>
