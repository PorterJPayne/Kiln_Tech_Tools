<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Kiln Tools - Notes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/core/platform1.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/core/api/notes-api.js"></script>

<script src="/core/api/search-api.js"></script>

<script src="/core/layout.js" defer></script>

  <style>

    .content{
      padding:0 !important;
      margin:0 !important;
      overflow:hidden;
      height:calc(100vh - 110px);
    }

    .notes-container{
      width:100%;
      height:100%;
      overflow:hidden;
    }

    .notes-frame{
      width:100%;
      height:100%;
      border:none;
      display:block;
      background:transparent;
    }

  </style>

</head>

<body
  class="platform-body"
  data-title="Notes"
  data-description="Operational notes and workflow tracking."
>

<div class="app">

  <aside
    class="sidebar"
    id="sidebar"
></aside>

  <main class="main platform-page">

    <div id="topbar"></div>

    <div class="content">

      <div class="notes-container">

        <iframe
          class="notes-frame"
          src="notes/index.html"
        ></iframe>

      </div>

    </div>

  </main>

</div>

</body>
</html>
