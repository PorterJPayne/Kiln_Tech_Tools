<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>OfficeRnD</title>

<link
    rel="stylesheet"
    href="/core/platform1.css"
>

<script>
window.sidebarPath = "/core/sidebar.html";
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/core/api/supabase.js"></script>

<script src="/core/layout.js" defer></script>

<script src="/core/tasks/task-modal.js"></script>

<style>

.officernd-card{
    background: var(--card-bg, #fff);
    border: 1px solid var(--border-color, #ddd);
    border-radius: 12px;
    padding: 20px;
}

.officernd-actions{
    margin-bottom: 20px;
}

.officernd-button{
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
}

.ticket-card{
    border: 1px solid var(--border-color, #ddd);
    border-radius: 10px;
    padding: 12px;
    margin-top: 10px;
    background: var(--card-bg, #fff);
}

.ticket-number{
    font-weight: 700;
    margin-bottom: 4px;
}

.ticket-subject{
    margin-bottom: 8px;
}

.ticket-status{
    display: inline-block;
    padding: 4px 8px;
    border-radius: 6px;
    background: #e5e7eb;
    font-size: 12px;
    font-weight: 600;
}

</style>

</head>

<body
    class="platform-body"
    data-title="OfficeRnD"
    data-description="OfficeRnD Integration Testing"
>

<div class="app">

    <!-- SIDEBAR -->

    <aside
        class="sidebar"
        id="sidebar"
    ></aside>

    <!-- MAIN -->

    <main class="main platform-page">

        <!-- TOPBAR -->

        <div id="topbar"></div>

        <!-- CONTENT -->

        <div class="content">

            <div class="officernd-card">

                <h2>OfficeRnD Issues</h2>

                <p>
                    Testing page for OfficeRnD ticket integration.
                </p>

                <div class="officernd-actions">

                    <button
                        id="loadOfficerndBtn"
                        class="officernd-button"
                    >
                        Load OfficeRnD Data
                    </button>

                </div>

                <div id="officerndResults"></div>

            </div>

        </div>

    </main>

</div>

<script>

const sampleTickets = [
    {
        number: 712087,
        subject: "Poor Wi-Fi in South East 2F",
        status: "Pending"
    },
    {
        number: 711321,
        subject: "Reserving the Atrium in Lehi 2",
        status: "Open"
    }
];

document.addEventListener("DOMContentLoaded", () => {

    document
        .getElementById("loadOfficerndBtn")
        .addEventListener("click", loadOfficernd);

});

function loadOfficernd() {

    const container =
        document.getElementById("officerndResults");

    container.innerHTML = sampleTickets
        .map(ticket => `
            <div class="ticket-card">

                <div class="ticket-number">
                    #${ticket.number}
                </div>

                <div class="ticket-subject">
                    ${ticket.subject}
                </div>

                <div class="ticket-status">
                    ${ticket.status}
                </div>

            </div>
        `)
        .join("");

}

</script>

</body>
</html>
