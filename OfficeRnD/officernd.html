<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>OfficeRnD</title>

<link
    rel="stylesheet"
    href="/core/platform1.css"
>

<script>
window.sidebarPath = "/core/sidebar.html";
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="/core/api/supabase.js"></script>
<script src="/core/layout.js" defer></script>
<script src="/core/tasks/task-modal.js"></script>

<style>

.officernd-panel{
    background:#10253f;
    color:white;
    border-radius:12px;
    padding:20px;
}

.officernd-panel h2,
.officernd-panel p{
    color:white;
}

.officernd-button{
    background:#1d4ed8;
    color:white;
    border:none;
    border-radius:8px;
    padding:10px 16px;
    font-weight:600;
    cursor:pointer;
    margin-bottom:20px;
}

.officernd-button:hover{
    opacity:.9;
}

.officernd-summary{
    background:#17314f;
    color:white;
    border-radius:10px;
    padding:12px;
    margin-bottom:15px;
}

.ticket-card{
    background:#17314f;
    color:white;
    border-radius:10px;
    padding:12px;
    margin-bottom:10px;
}

.ticket-number{
    font-weight:700;
    margin-bottom:4px;
}

.ticket-subject{
    font-size:15px;
    font-weight:600;
    margin-bottom:8px;
}

.ticket-message{
    opacity:.9;
    margin-bottom:10px;
}

.ticket-status{
    display:inline-block;
    background:#2563eb;
    color:white;
    border-radius:6px;
    padding:4px 8px;
    font-size:12px;
    font-weight:600;
}

.error-box{
    background:#7f1d1d;
    color:white;
    padding:12px;
    border-radius:8px;
}

</style>

</head>

<body
    class="platform-body"
    data-title="OfficeRnD"
    data-description="OfficeRnD Integration Testing"
>

<div class="app">

    <aside
        class="sidebar"
        id="sidebar"
    ></aside>

    <main class="main platform-page">

        <div id="topbar"></div>

        <div class="content">

            <div class="officernd-panel">

                <h2>OfficeRnD Issues</h2>

                <p>
                    Load data from officernd-data.json and display the first 10 issues.
                </p>

                <button
                    id="loadOfficerndBtn"
                    class="officernd-button"
                >
                    Sync OfficeRnD
                </button>

                <div id="officerndResults"></div>

            </div>

        </div>

    </main>

</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

    document
        .getElementById("loadOfficerndBtn")
        .addEventListener("click", loadOfficernd);

});

async function syncOfficeRnd() {

    const tickets =
        await fetch(
            "/officernd/officernd-data.json"
        ).then(r => r.json());

    console.log(
        "Found",
        tickets.length,
        "OfficeRnD tickets"
    );

}

</script>

</body>
</html>
