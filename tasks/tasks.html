<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Tasks</title>

<link
    rel="stylesheet"
    href="/core/platform1.css"
>

<script>
window.sidebarPath = "/core/sidebar.html";
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/core/api/supabase.js"></script>

<script src="/core/api/tasks-api.js"></script>

<script src="/core/layout.js" defer></script>

<link
    rel="stylesheet"
    href="/tasks/tasks.css"
>

</head>

<body
class="platform-body"
data-title="Tasks"
data-description="Weekly operational planning."
>

<div class="app">

<!-- SIDEBAR -->

<aside
class="sidebar"
id="sidebar"
></aside>

<!-- MAIN -->

<main class="main platform-page">

<div id="topbar"></div>

<div class="content">

<div class="tasks-layout">

    <!-- ========================= -->
    <!-- INBOX -->
    <!-- ========================= -->

    <section class="tasks-panel">

        <div class="tasks-panel-header">

    <div class="section-title">
        Inbox
    </div>

    <div
        style="
            display:flex;
            gap:6px;
        "
    >

        <a
            href="/tasks/manage.html"
            class="button"
        >
            Manage
        </a>

        <button
            id="newTaskBtn"
            class="button button-primary"
            onclick="openTaskModal()"
        >
            + Task
        </button>

    </div>

</div>

        <div
    id="inboxTable"
    class="task-list planner-dropzone"
></div>

    </section>


    <!-- ========================= -->
    <!-- WEEK PLANNER -->
    <!-- ========================= -->

    <section class="planner-layout">

        <div
            class="planner-column"
            data-day="monday"
        >

            <div class="planner-column-header">

                <div class="section-title">
                    Monday
                </div>

                <div
                    id="count-monday"
                    class="planner-count"
                >
                    0
                </div>

            </div>

            <div class="planner-dropzone"></div>

        </div>


        <div
            class="planner-column"
            data-day="tuesday"
        >

            <div class="planner-column-header">

                <div class="section-title">
                    Tuesday
                </div>

                <div
                    id="count-tuesday"
                    class="planner-count"
                >
                    0
                </div>

            </div>

            <div class="planner-dropzone"></div>

        </div>


        <div
            class="planner-column"
            data-day="wednesday"
        >

            <div class="planner-column-header">

                <div class="section-title">
                    Wednesday
                </div>

                <div
                    id="count-wednesday"
                    class="planner-count"
                >
                    0
                </div>

            </div>

            <div class="planner-dropzone"></div>

        </div>


        <div
            class="planner-column"
            data-day="thursday"
        >

            <div class="planner-column-header">

                <div class="section-title">
                    Thursday
                </div>

                <div
                    id="count-thursday"
                    class="planner-count"
                >
                    0
                </div>

            </div>

            <div class="planner-dropzone"></div>

        </div>


        <div
            class="planner-column"
            data-day="friday"
        >

            <div class="planner-column-header">

                <div class="section-title">
                    Friday
                </div>

                <div
                    id="count-friday"
                    class="planner-count"
                >
                    0
                </div>

            </div>

            <div class="planner-dropzone"></div>

        </div>

    </section>

</div>

</div>

</main>

</div>

<script src="/tasks/tasks.js"></script>

</body>
</html>
