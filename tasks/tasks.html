<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Tasks</title>

    <link
        rel="stylesheet"
        href="../styles.css"
    />

    <link
        rel="stylesheet"
        href="tasks.css"
    />

</head>

<body class="platform-body">

    <div class="app">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <div class="logo">
                Kiln<span>Tech</span>
            </div>

        </aside>


        <!-- MAIN -->

        <main class="main">

            <!-- TOPBAR -->

            <header class="topbar">

                <div class="topbar-left">

                    <h2>
                        Tasks
                    </h2>

                    <p>
                        Plan your operational week
                    </p>

                </div>

                <div class="topbar-right">

                    <button
                        id="new-task-btn"
                        class="button button-primary"
                    >
                        + Task
                    </button>

                </div>

            </header>


            <!-- CONTENT -->

            <div class="content">

                <div class="tasks-page">

                    <!-- ========================= -->
                    <!-- INBOX -->
                    <!-- ========================= -->

                    <section class="tasks-inbox">

                        <div class="flex-between">

                            <h3>
                                Inbox
                            </h3>

                            <span
                                id="inbox-count"
                                class="tag tag-yellow"
                            >
                                0
                            </span>

                        </div>

                        <div
                            id="inbox-table"
                            class="inbox-table"
                        >

                        </div>

                    </section>


                    <!-- ========================= -->
                    <!-- PLANNER -->
                    <!-- ========================= -->

                    <section class="planner">

                        <!-- MONDAY -->

                        <div
                            class="planner-day panel"
                            data-day="monday"
                        >

                            <div class="planner-header">

                                <h3>
                                    Mon
                                </h3>

                                <span
                                    class="day-count"
                                    id="count-monday"
                                >
                                    0
                                </span>

                            </div>

                            <div class="planner-dropzone"></div>

                        </div>


                        <!-- TUESDAY -->

                        <div
                            class="planner-day panel"
                            data-day="tuesday"
                        >

                            <div class="planner-header">

                                <h3>
                                    Tue
                                </h3>

                                <span
                                    class="day-count"
                                    id="count-tuesday"
                                >
                                    0
                                </span>

                            </div>

                            <div class="planner-dropzone"></div>

                        </div>


                        <!-- WEDNESDAY -->

                        <div
                            class="planner-day panel"
                            data-day="wednesday"
                        >

                            <div class="planner-header">

                                <h3>
                                    Wed
                                </h3>

                                <span
                                    class="day-count"
                                    id="count-wednesday"
                                >
                                    0
                                </span>

                            </div>

                            <div class="planner-dropzone"></div>

                        </div>


                        <!-- THURSDAY -->

                        <div
                            class="planner-day panel"
                            data-day="thursday"
                        >

                            <div class="planner-header">

                                <h3>
                                    Thu
                                </h3>

                                <span
                                    class="day-count"
                                    id="count-thursday"
                                >
                                    0
                                </span>

                            </div>

                            <div class="planner-dropzone"></div>

                        </div>


                        <!-- FRIDAY -->

                        <div
                            class="planner-day panel"
                            data-day="friday"
                        >

                            <div class="planner-header">

                                <h3>
                                    Fri
                                </h3>

                                <span
                                    class="day-count"
                                    id="count-friday"
                                >
                                    0
                                </span>

                            </div>

                            <div class="planner-dropzone"></div>

                        </div>

                    </section>

                </div>

            </div>

        </main>

    </div>

    <script src="../core/supabase.js"></script>

    <script src="../core/api/tasks-api.js"></script>

    <script src="tasks.js"></script>

</body>

</html>
