<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Projects</title>

<link
    rel="stylesheet"
    href="/core/platform1.css"
>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/core/api/supabase.js"></script>

<script src="/core/api/projects-api.js"></script>

<script src="/core/layout.js" defer></script>

<style>

.content{

    padding:10px;

}

.projects-layout{

    display:grid;

    grid-template-columns:
        1fr
        1fr;

    gap:10px;

}

.project-section{

    background:rgba(255,255,255,0.025);

    border:1px solid rgba(255,255,255,0.05);

    border-radius:6px;

    padding:12px;

}

.section-title{

    font-size:10px;

    text-transform:uppercase;

    letter-spacing:1.4px;

    color:rgba(255,255,255,0.45);

    margin-bottom:12px;

}

.project-card{

    display:block;

    text-decoration:none;

    color:white;

    padding:10px;

    border-bottom:1px solid rgba(255,255,255,0.05);

}

.project-card:hover{

    background:rgba(255,255,255,0.03);

}

.project-title{

    font-size:13px;

    font-weight:700;

}

.project-meta{

    margin-top:4px;

    font-size:11px;

    color:rgba(255,255,255,0.5);

}

</style>

</head>

<body
class="platform-body"
data-title="Projects"
data-description="Operational projects overview."
>

<div class="app">

<aside
class="sidebar"
id="sidebar"
></aside>

<main class="main platform-page">

<div id="topbar"></div>

<div class="content">

<div class="projects-layout">

<!-- ACTIVE -->

<div class="project-section">

<div class="section-title">
Active Projects
</div>

<div id="activeProjects"></div>

</div>

<!-- ARCHIVE -->

<div class="project-section">

<div class="section-title">
Archive
</div>

<div id="archivedProjects"></div>

</div>

</div>

</div>

</main>

</div>

<script>

async function init(){

    const projects =
        await fetchProjects();

    const active =
        document.getElementById(
            "activeProjects"
        );

    const archived =
        document.getElementById(
            "archivedProjects"
        );

    active.innerHTML = "";

    archived.innerHTML = "";

    projects.forEach(project => {

        const card =
            document.createElement("a");

        card.className =
            "project-card";

        card.href =
            `/projects/project.html?id=${project.id}`;

        card.innerHTML = `

            <div class="project-title">
                ${project.title}
            </div>

            <div class="project-meta">
                ${project.status || "Active"}
            </div>

        `;

        if(
            project.status === "Completed"
        ){

            archived.appendChild(
                card
            );

        }

        else {

            active.appendChild(
                card
            );

        }

    });

}

init();

</script>

</body>
</html>
