<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Project</title>

<link
    rel="stylesheet"
    href="/core/platform1.css"
>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/core/api/supabase.js"></script>

<script src="/core/api/projects-api.js"></script>

<script src="/core/api/tasks-api.js"></script>

<script src="/core/api/notes-api.js"></script>

<script src="/core/layout.js" defer></script>

<style>

/* ========================================
   PROJECT PAGE
======================================== */

.project-layout{

    display:grid;

    grid-template-columns:
        2.2fr
        1fr;

    gap:10px;

}

.project-panel{

    background:rgba(255,255,255,0.025);

    border:1px solid rgba(255,255,255,0.05);

    border-radius:6px;

    padding:12px;

}

.project-header{

    display:flex;

    justify-content:space-between;

    align-items:flex-start;

    gap:16px;

}

.project-title{

    font-size:22px;

    font-weight:700;

    line-height:1.1;

}

.project-description{

    margin-top:6px;

    color:rgba(255,255,255,0.62);

    font-size:12px;

    line-height:1.4;

    max-width:720px;

}

.project-status{

    font-size:11px;

    padding:4px 8px;

    border-radius:999px;

    background:rgba(255,255,255,0.05);

}

.section-title{

    font-size:11px;

    font-weight:700;

    letter-spacing:1.4px;

    text-transform:uppercase;

    color:rgba(255,255,255,0.4);

    margin-bottom:10px;

}

.project-grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:10px;

}

.project-card{

    padding:10px;

    border-radius:6px;

    background:rgba(255,255,255,0.025);

    border:1px solid rgba(255,255,255,0.05);

}

.project-item{

    display:flex;

    justify-content:space-between;

    align-items:center;

    min-height:32px;

    padding:0 2px;

    border-bottom:1px solid rgba(255,255,255,0.04);

    font-size:11px;

}

.project-item:last-child{

    border-bottom:none;

}

.quick-add{

    width:100%;

    margin-bottom:8px;

}

.activity-item{

    padding:8px 0;

    border-bottom:1px solid rgba(255,255,255,0.05);

    font-size:11px;

    line-height:1.35;

}

.activity-item:last-child{

    border-bottom:none;

}

.photo-placeholder{

    height:120px;

    border-radius:6px;

    border:1px dashed rgba(255,255,255,0.12);

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:11px;

    color:rgba(255,255,255,0.4);

}

</style>

</head>

<body
    class="platform-body"
    data-title="Project"
    data-description="Operational project workspace."
>

<div class="app">

    <aside
        class="sidebar"
        id="sidebar"
    ></aside>

    <main class="main platform-page">

        <div id="topbar"></div>

        <div class="content">

            <!-- HEADER -->

            <div class="project-panel">

                <div class="project-header">

                    <div>

                        <div
                            class="project-title"
                            id="projectTitle"
                        >
                            Loading...
                        </div>

                        <div
                            class="project-description"
                            id="projectDescription"
                        ></div>

                    </div>

                    <div
                        class="project-status"
                        id="projectStatus"
                    >
                        Active
                    </div>

                </div>

            </div>

            <div style="height:10px;"></div>

            <!-- MAIN LAYOUT -->

            <div class="project-layout">

                <!-- LEFT -->

                <div
                    style="
                        display:flex;
                        flex-direction:column;
                        gap:10px;
                    "
                >

                    <!-- TASKS + NOTES -->

                    <div class="project-panel">

                        <div class="section-title">
                            Operational Links
                        </div>

                        <div class="project-grid">

                            <!-- TASKS -->

                            <div class="project-card">

                                <input
                                    class="input quick-add"
                                    placeholder="Add existing task..."
                                >

                                <div id="projectTasks">

                                    <div class="project-item">
                                        Replace phone booth panels
                                    </div>

                                    <div class="project-item">
                                        Wiring overlay fixes
                                    </div>

                                </div>

                            </div>

                            <!-- NOTES -->

                            <div class="project-card">

                                <input
                                    class="input quick-add"
                                    placeholder="Add existing note..."
                                >

                                <div id="projectNotes">

                                    <div class="project-item">
                                        Paint touchups list
                                    </div>

                                    <div class="project-item">
                                        Lehi 2 walkthrough
                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                    <!-- PHOTOS -->

                    <div class="project-panel">

                        <div class="section-title">
                            Photos & Files
                        </div>

                        <div class="photo-placeholder">
                            Future upload area
                        </div>

                    </div>

                </div>

                <!-- RIGHT -->

                <div
                    style="
                        display:flex;
                        flex-direction:column;
                        gap:10px;
                    "
                >

                    <!-- ACTIVITY -->

                    <div class="project-panel">

                        <div class="section-title">
                            Activity
                        </div>

                        <div class="activity-item">
                            Added project
                        </div>

                        <div class="activity-item">
                            Linked task:
                            Replace phone booth panels
                        </div>

                        <div class="activity-item">
                            Daily update sent
                        </div>

                    </div>

                    <!-- EXPORT -->

                    <div class="project-panel">

                        <div class="section-title">
                            Export
                        </div>

                        <button
                            class="button button-primary"
                            style="width:100%;"
                        >
                            Generate Project Update
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </main>

</div>

<script>

// =========================
// LOAD PROJECT
// =========================

async function initProject(){

    const params =
        new URLSearchParams(
            window.location.search
        );

    const id =
        params.get("id");

    const projects =
        await fetchProjects();

    const project =
        projects.find(
            p => p.id == id
        );

    if(!project) return;

    document.getElementById(
        "projectTitle"
    ).textContent =
        project.title;

    document.getElementById(
        "projectDescription"
    ).textContent =
        project.description || "";

    document.getElementById(
        "projectStatus"
    ).textContent =
        project.status || "Active";

}

initProject();

</script>

</body>
</html>
