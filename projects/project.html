<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Project</title>

<link
    rel="stylesheet"
    href="/core/platform1.css"
>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/core/api/supabase.js"></script>

<script src="/core/api/projects-api.js"></script>

<script src="/core/api/tasks-api.js"></script>

<script src="/core/api/notes-api.js"></script>

<script src="/core/layout.js" defer></script>

<style>

/* ========================================
   PROJECT PAGE
======================================== */

.content{

    padding:10px;

}

.project-layout{

    display:grid;

    grid-template-columns:
        2.1fr
        1fr;

    gap:10px;

}

.project-panel{

    background:rgba(255,255,255,0.025);

    border:1px solid rgba(255,255,255,0.05);

    border-radius:6px;

    padding:12px;

}

.project-header{

    display:flex;

    justify-content:space-between;

    align-items:flex-start;

    gap:16px;

}

.project-title{

    font-size:24px;

    font-weight:700;

    line-height:1.1;

}

.project-description{

    margin-top:8px;

    font-size:12px;

    line-height:1.5;

    color:rgba(255,255,255,0.68);

    white-space:pre-wrap;

}

.description-edit{

    width:100%;

    min-height:100px;

    resize:vertical;

    display:none;

    margin-top:8px;

}

.section-title{

    font-size:10px;

    font-weight:700;

    letter-spacing:1.4px;

    text-transform:uppercase;

    color:rgba(255,255,255,0.42);

    margin-bottom:10px;

}

.attach-toolbar{

    display:flex;

    gap:8px;

    margin-bottom:10px;

}

.attach-menu{

    position:relative;

}

.dropdown{

    position:absolute;

    top:34px;

    left:0;

    width:280px;

    max-height:260px;

    overflow:auto;

    background:#111;

    border:1px solid rgba(255,255,255,0.08);

    border-radius:6px;

    padding:8px;

    display:none;

    z-index:100;

}

.dropdown.open{

    display:block;

}

.dropdown-item{

    display:flex;

    align-items:center;

    gap:8px;

    min-height:30px;

    font-size:11px;

}

.dropdown-footer{

    padding-top:8px;

    margin-top:8px;

    border-top:1px solid rgba(255,255,255,0.06);

}

.attached-list{

    display:flex;

    flex-direction:column;

}

.attached-item{

    display:flex;

    justify-content:space-between;

    align-items:center;

    min-height:34px;

    padding:0 2px;

    border-bottom:1px solid rgba(255,255,255,0.05);

    font-size:11px;

}

.attached-item:last-child{

    border-bottom:none;

}

.remove-link{

    cursor:pointer;

    opacity:0.45;

}

.remove-link:hover{

    opacity:1;

}

.journal{

    width:100%;

    min-height:260px;

    resize:vertical;

    line-height:1.55;

}

.upload-area{

    border:1px dashed rgba(255,255,255,0.12);

    border-radius:6px;

    padding:20px;

    text-align:center;

}

.upload-preview{

    display:grid;

    grid-template-columns:
        repeat(auto-fill,minmax(120px,1fr));

    gap:8px;

    margin-top:12px;

}

.upload-preview img{

    width:100%;

    height:120px;

    object-fit:cover;

    border-radius:6px;

    border:1px solid rgba(255,255,255,0.08);

}

.activity-item{

    padding:8px 0;

    border-bottom:1px solid rgba(255,255,255,0.05);

    font-size:11px;

    line-height:1.4;

}

.activity-item:last-child{

    border-bottom:none;

}

.autosave{

    position:fixed;

    bottom:12px;

    right:16px;

    font-size:11px;

    opacity:0.5;

}

</style>

</head>

<body
class="platform-body"
data-title="Project"
data-description="Operational project workspace."
>

<div class="app">

<aside
class="sidebar"
id="sidebar"
></aside>

<main class="main platform-page">

<div id="topbar"></div>

<div class="content">

<!-- HEADER -->

<div class="project-panel">

<div class="project-header">

<div style="flex:1;">

<div
id="projectTitle"
class="project-title"
>
Loading...
</div>

<div
id="projectDescription"
class="project-description"
></div>

<textarea
id="projectDescriptionEdit"
class="input description-edit"
></textarea>

</div>

<div
style="
display:flex;
gap:8px;
align-items:flex-start;
"
>

<select
id="projectStatus"
class="input"
>

<option>Active</option>
<option>Planning</option>
<option>Waiting</option>
<option>Blocked</option>
<option>Completed</option>

</select>

<button
class="button"
id="editDescriptionBtn"
>
Edit
</button>

</div>

</div>

</div>

<div style="height:10px;"></div>

<!-- MAIN -->

<div class="project-layout">

<!-- LEFT -->

<div
style="
display:flex;
flex-direction:column;
gap:10px;
"
>

<!-- LINKS -->

<div class="project-panel">

<div class="section-title">
Operational Links
</div>

<div class="attach-toolbar">

<!-- TASKS -->

<div class="attach-menu">

<button
class="button"
id="tasksMenuBtn"
>
+ Tasks
</button>

<div
class="dropdown"
id="tasksDropdown"
>

<div id="tasksDropdownContent"></div>

<div class="dropdown-footer">

<button
class="button button-primary"
id="attachTasksBtn"
style="width:100%;"
>
Attach Selected
</button>

</div>

</div>

</div>

<!-- NOTES -->

<div class="attach-menu">

<button
class="button"
id="notesMenuBtn"
>
+ Notes
</button>

<div
class="dropdown"
id="notesDropdown"
>

<div id="notesDropdownContent"></div>

<div class="dropdown-footer">

<button
class="button button-primary"
id="attachNotesBtn"
style="width:100%;"
>
Attach Selected
</button>

</div>

</div>

</div>

</div>

<div
id="attachedItems"
class="attached-list"
></div>

</div>

<!-- JOURNAL -->

<div class="project-panel">

<div class="section-title">
Project Journal
</div>

<textarea
id="projectJournal"
class="input journal"
placeholder="Running project notes..."
></textarea>

</div>

<!-- FILES -->

<div class="project-panel">

<div class="section-title">
Photos & Files
</div>

<div class="upload-area">

<input
type="file"
id="fileUpload"
multiple
>

<div
class="upload-preview"
id="uploadPreview"
></div>

</div>

</div>

</div>

<!-- RIGHT -->

<div
style="
display:flex;
flex-direction:column;
gap:10px;
"
>

<!-- ACTIVITY -->

<div class="project-panel">

<div class="section-title">
Activity
</div>

<div id="activityFeed"></div>

</div>

<!-- EXPORT -->

<div class="project-panel">

<div class="section-title">
Export
</div>

<button
class="button button-primary"
id="exportBtn"
style="width:100%;"
>
Generate Project Update
</button>

</div>

</div>

</div>

</div>

</main>

</div>

<div
class="autosave"
id="autosaveStatus"
>
Saved
</div>

<script>

// ========================================
// STATE
// ========================================

let currentProject = null;

let attachedTasks = [];

let attachedNotes = [];

// ========================================
// INIT
// ========================================

async function initProject(){

    const params =
        new URLSearchParams(
            window.location.search
        );

    const id =
        params.get("id");

    const projects =
        await fetchProjects();

    currentProject =
        projects.find(
            p => p.id == id
        );

    if(!currentProject) return;

    attachedTasks =
        JSON.parse(
            localStorage.getItem(
                `project_tasks_${id}`
            ) || "[]"
        );

    attachedNotes =
        JSON.parse(
            localStorage.getItem(
                `project_notes_${id}`
            ) || "[]"
        );

    renderProject();

    renderAttached();

    loadTaskDropdown();

    loadNoteDropdown();

}

// ========================================
// RENDER
// ========================================

function renderProject(){

    document.getElementById(
        "projectTitle"
    ).textContent =
        currentProject.title;

    document.getElementById(
        "projectDescription"
    ).textContent =
        currentProject.description || "";

    document.getElementById(
        "projectDescriptionEdit"
    ).value =
        currentProject.description || "";

    document.getElementById(
        "projectStatus"
    ).value =
        currentProject.status || "Active";

    document.getElementById(
        "projectJournal"
    ).value =
        currentProject.journal || "";

}

// ========================================
// AUTOSAVE
// ========================================

async function autosaveProject(){

    document.getElementById(
        "autosaveStatus"
    ).textContent =
        "Saving...";

    await supabaseClient
        .from("projects")
        .update({

            description:
                document.getElementById(
                    "projectDescriptionEdit"
                ).value,

            status:
                document.getElementById(
                    "projectStatus"
                ).value,

            journal:
                document.getElementById(
                    "projectJournal"
                ).value

        })
        .eq(
            "id",
            currentProject.id
        );

    document.getElementById(
        "projectDescription"
    ).textContent =
        document.getElementById(
            "projectDescriptionEdit"
        ).value;

    document.getElementById(
        "autosaveStatus"
    ).textContent =
        "Saved";

}

// ========================================
// DESCRIPTION EDIT
// ========================================

document.getElementById(
    "editDescriptionBtn"
).onclick =
() => {

    const text =
        document.getElementById(
            "projectDescription"
        );

    const edit =
        document.getElementById(
            "projectDescriptionEdit"
        );

    if(edit.style.display === "block"){

        text.style.display = "block";

        edit.style.display = "none";

        autosaveProject();

    }

    else {

        text.style.display = "none";

        edit.style.display = "block";

    }

};

// ========================================
// TASKS
// ========================================

async function loadTaskDropdown(){

    const tasks =
        await fetchTasks();

    const container =
        document.getElementById(
            "tasksDropdownContent"
        );

    container.innerHTML = "";

    const filtered =
        tasks.filter(task => {

            if(
                attachedTasks.includes(
                    task.title
                )
            ){
                return false;
            }

            const created =
                new Date(
                    task.created_at
                );

            const projectCreated =
                new Date(
                    currentProject.created_at
                );

            return created >= projectCreated;

        });

    filtered.forEach(task => {

        const row =
            document.createElement("label");

        row.className =
            "dropdown-item";

        row.innerHTML = `

            <input
                type="checkbox"
                value="${task.title}"
            >

            ${task.title}

        `;

        container.appendChild(row);

    });

}

// ========================================
// NOTES
// ========================================

async function loadNoteDropdown(){

    const notes =
        await fetchNotes();

    const container =
        document.getElementById(
            "notesDropdownContent"
        );

    container.innerHTML = "";

    const filtered =
        notes.filter(note => {

            return !attachedNotes.includes(
                note.title
            );

        });

    filtered.forEach(note => {

        const row =
            document.createElement("label");

        row.className =
            "dropdown-item";

        row.innerHTML = `

            <input
                type="checkbox"
                value="${note.title}"
            >

            ${note.title}

        `;

        container.appendChild(row);

    });

}

// ========================================
// DROPDOWNS
// ========================================

document.getElementById(
    "tasksMenuBtn"
).onclick =
() => {

    document
        .getElementById(
            "tasksDropdown"
        )
        .classList
        .toggle("open");

};

document.getElementById(
    "notesMenuBtn"
).onclick =
() => {

    document
        .getElementById(
            "notesDropdown"
        )
        .classList
        .toggle("open");

};

// ========================================
// ATTACH TASKS
// ========================================

document.getElementById(
    "attachTasksBtn"
).onclick =
() => {

    const checked =
        [
            ...document.querySelectorAll(
                "#tasksDropdown input:checked"
            )
        ];

    checked.forEach(item => {

        if(
            !attachedTasks.includes(
                item.value
            )
        ){

            attachedTasks.push(
                item.value
            );

        }

    });

    localStorage.setItem(
        `project_tasks_${currentProject.id}`,
        JSON.stringify(attachedTasks)
    );

    renderAttached();

    loadTaskDropdown();

    document
        .getElementById(
            "tasksDropdown"
        )
        .classList
        .remove("open");

};

// ========================================
// ATTACH NOTES
// ========================================

document.getElementById(
    "attachNotesBtn"
).onclick =
() => {

    const checked =
        [
            ...document.querySelectorAll(
                "#notesDropdown input:checked"
            )
        ];

    checked.forEach(item => {

        if(
            !attachedNotes.includes(
                item.value
            )
        ){

            attachedNotes.push(
                item.value
            );

        }

    });

    localStorage.setItem(
        `project_notes_${currentProject.id}`,
        JSON.stringify(attachedNotes)
    );

    renderAttached();

    loadNoteDropdown();

    document
        .getElementById(
            "notesDropdown"
        )
        .classList
        .remove("open");

};

// ========================================
// RENDER ATTACHED
// ========================================

function renderAttached(){

    const container =
        document.getElementById(
            "attachedItems"
        );

    container.innerHTML = "";

    attachedTasks.forEach(task => {

        const div =
            document.createElement("div");

        div.className =
            "attached-item";

        div.innerHTML = `

            <span>
                ✓ ${task}
            </span>

            <span
                class="remove-link"
                onclick="removeTask('${task}')"
            >
                Remove
            </span>

        `;

        container.appendChild(div);

    });

    attachedNotes.forEach(note => {

        const div =
            document.createElement("div");

        div.className =
            "attached-item";

        div.innerHTML = `

            <span>
                📝 ${note}
            </span>

            <span
                class="remove-link"
                onclick="removeNote('${note}')"
            >
                Remove
            </span>

        `;

        container.appendChild(div);

    });

}

// ========================================
// REMOVE
// ========================================

function removeTask(task){

    attachedTasks =
        attachedTasks.filter(
            t => t !== task
        );

    localStorage.setItem(
        `project_tasks_${currentProject.id}`,
        JSON.stringify(attachedTasks)
    );

    renderAttached();

    loadTaskDropdown();

}

function removeNote(note){

    attachedNotes =
        attachedNotes.filter(
            n => n !== note
        );

    localStorage.setItem(
        `project_notes_${currentProject.id}`,
        JSON.stringify(attachedNotes)
    );

    renderAttached();

    loadNoteDropdown();

}

// ========================================
// FILE UPLOAD
// ========================================

document.getElementById(
    "fileUpload"
).addEventListener(
    "change",
    e => {

        const preview =
            document.getElementById(
                "uploadPreview"
            );

        [...e.target.files]
            .forEach(file => {

                if(
                    file.type.startsWith(
                        "image/"
                    )
                ){

                    const img =
                        document.createElement(
                            "img"
                        );

                    img.src =
                        URL.createObjectURL(
                            file
                        );

                    preview.appendChild(img);

                }

            });

    }
);

// ========================================
// EXPORT
// ========================================

document.getElementById(
    "exportBtn"
).onclick =
() => {

    const exportText = `

PROJECT UPDATE
======================

PROJECT:
${currentProject.title}

STATUS:
${document.getElementById("projectStatus").value}

DESCRIPTION:
${document.getElementById("projectDescription").textContent}

TASKS:
${attachedTasks.join("\n")}

NOTES:
${attachedNotes.join("\n")}

JOURNAL:
${document.getElementById("projectJournal").value}

    `;

    navigator.clipboard.writeText(
        exportText
    );

    alert(
        "Project update copied"
    );

};

// ========================================
// AUTOSAVE EVENTS
// ========================================

document.getElementById(
    "projectStatus"
).addEventListener(
    "change",
    autosaveProject
);

document.getElementById(
    "projectJournal"
).addEventListener(
    "input",
    autosaveProject
);

// ========================================
// START
// ========================================

initProject();

</script>

</body>
</html>
