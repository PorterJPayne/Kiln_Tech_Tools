<meta

    rel="stylesheet"
    href="/core/platform1.css"

<script src="/core/api/supabase.js"></script>

<style>

.content{

    padding:10px;

}

.project-layout{

    display:grid;

    grid-template-columns:
        2.2fr
        1fr;

    gap:10px;

}

.project-panel{

    background:rgba(255,255,255,0.025);

    border:1px solid rgba(255,255,255,0.05);

    border-radius:6px;

    padding:12px;

}

.project-header{

    display:flex;

    justify-content:space-between;

    align-items:flex-start;

    gap:16px;

}

.project-title{

    font-size:24px;

    font-weight:700;

}

.project-description{

    margin-top:8px;

    color:rgba(255,255,255,0.65);

    line-height:1.6;

    font-size:12px;

    white-space:pre-wrap;

}

.utility-controls{

    display:flex;

    gap:6px;

}

.section-title{

    font-size:10px;

    font-weight:700;

    letter-spacing:1.3px;

    text-transform:uppercase;

    color:rgba(255,255,255,0.42);

    margin-bottom:10px;

}

.mini-button{

    background:none;

    border:none;

    color:rgba(255,255,255,0.45);

    font-size:11px;

    cursor:pointer;

    padding:4px 6px;

}

.attach-toolbar{

    display:flex;

    gap:6px;

    margin-bottom:10px;

}

.attach-dropdown{

    position:relative;

}

.attach-menu{

    position:absolute;

    top:28px;

    left:0;

    width:320px;

    max-height:300px;

    overflow:auto;

    background:#111;

    border:1px solid rgba(255,255,255,0.08);

    border-radius:6px;

    padding:8px;

    display:none;

    z-index:100;

}

.attach-menu.open{

    display:block;

}

.attach-row{

    display:flex;

    align-items:center;

    gap:8px;

    min-height:30px;

    font-size:11px;

}

.attach-footer{

    margin-top:8px;

    padding-top:8px;

    border-top:1px solid rgba(255,255,255,0.06);

}

.attached-item{

    border-bottom:1px solid rgba(255,255,255,0.05);

    padding:6px 0;

}

.attached-header{

    min-height:34px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    cursor:pointer;

    font-size:11px;

}

.attached-left{

    display:flex;

    align-items:center;

    gap:8px;

}

.attached-preview{

    display:none;

    padding:8px 0 10px 22px;

    font-size:11px;

    line-height:1.6;

    color:rgba(255,255,255,0.65);

}

.attached-preview.open{

    display:block;

}

.complete-link{

    color:#8ee0a7;

    cursor:pointer;

    font-size:10px;

}

.remove-link{

    opacity:0.45;

    cursor:pointer;

    font-size:10px;

}

.completed-task{

    opacity:0.6;

}

.completed-task .attached-left{

    text-decoration:line-through;

}

.completed-badge{

    color:#8ee0a7;

    font-size:10px;

}

.completed-time{

    margin-top:6px;

    font-size:10px;

    color:rgba(255,255,255,0.4);

}

.journal{

    width:100%;

    min-height:240px;

    resize:vertical;

}

.upload-grid{

    display:grid;

    grid-template-columns:
        repeat(auto-fill,minmax(120px,1fr));

    gap:8px;

}

.upload-card img{

    width:100%;

    height:120px;

    object-fit:cover;

    border-radius:6px;

}

.upload-name{

    margin-top:4px;

    font-size:10px;

    color:rgba(255,255,255,0.5);

}

.activity-feed{

    max-height:420px;

    overflow:auto;

    padding-right:4px;

}

.activity-item{

    padding:8px 0;

    border-bottom:1px solid rgba(255,255,255,0.05);

    font-size:11px;

    line-height:1.5;

}

.modal-overlay{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,0.5);

    display:flex;

    align-items:center;

    justify-content:center;

    z-index:1000;

}

.hidden{

    display:none;

}

.task-modal{

    width:420px;

    background:#111;

    border:1px solid rgba(255,255,255,0.08);

    border-radius:8px;

    padding:14px;

}

.modal-grid{

    display:flex;

    flex-direction:column;

    gap:10px;

}

.modal-actions{

    display:flex;

    justify-content:flex-end;

    gap:8px;

    margin-top:14px;

}

</style>

</head>

"

"

Activity
</div>

<div
id="activityFeed"
class="activity-feed"
></div>

</div>

>

</div>

></textarea>

<script>

let currentProject = null;

let attachedTasks = [];

let attachedNotes = [];

let uploadedFiles = [];

let activeCompletionTask = null;

// ========================================
// INIT
// ========================================

async function initProject(){

    const params =
        new URLSearchParams(
            window.location.search
        );

    const id =
        params.get("id");

    const projects =
        await fetchProjects();

    currentProject =
        projects.find(
            p => String(p.id) === String(id)
        );

    if(!currentProject){

        console.error(
            "Project not found"
        );

        return;

    }

    renderProject();

    await loadLinks();

    await loadActivity();

    await loadFiles();

    await loadTaskMenu();

    await loadNoteMenu();

}

// ========================================
// PROJECT
// ========================================

function renderProject(){

    document.getElementById(
        "projectTitle"
    ).textContent =
        currentProject.title;

    document.getElementById(
        "projectDescription"
    ).textContent =
        currentProject.description || "";

    document.getElementById(
        "projectStatus"
    ).value =
        currentProject.status || "Active";

    document.getElementById(
        "projectJournal"
    ).value =
        currentProject.journal || "";

}

// ========================================
// LINKS
// ========================================

async function loadLinks(){

    const links =
        await fetchProjectLinks(
            currentProject.id
        );

    const tasks =
        await fetchTasks();

    const notes =
        await fetchNotes();

    attachedTasks =
        links
            .filter(
                l => l.item_type === "task"
            )
            .map(link =>
                tasks.find(
                    t => t.id === link.item_id
                )
            )
            .filter(Boolean);

    attachedNotes =
        links
            .filter(
                l => l.item_type === "note"
            )
            .map(link =>
                notes.find(
                    n => n.id === link.item_id
                )
            )
            .filter(Boolean);

    renderAttached();

}

// ========================================
// FILES
// ========================================

async function loadFiles(){

    uploadedFiles =
        await fetchProjectFiles(
            currentProject.id
        );

    renderUploads();

}

function renderUploads(){

    const grid =
        document.getElementById(
            "uploadGrid"
        );

    grid.innerHTML = "";

    uploadedFiles.forEach(file => {

        const card =
            document.createElement("div");

        card.className =
            "upload-card";

        card.innerHTML = `

            <a
                href="${file.file_url}"
                target="_blank"
            >

                <img
                    src="${file.file_url}"
                >

            </a>

            <div class="upload-name">
                ${file.file_name}
            </div>

        `;

        grid.appendChild(card);

    });

}

document.getElementById(
    "fileUpload"
).addEventListener(
    "change",
    async e => {

        const files =
            [...e.target.files];

        for(const file of files){

            const path =
                `${currentProject.id}/${Date.now()}_${file.name}`;

            const upload =
                await supabaseClient
                    .storage
                    .from(
                        "project-files"
                    )
                    .upload(
                        path,
                        file
                    );

            if(upload.error){

                console.error(
                    upload.error
                );

                continue;

            }

            const publicUrl =
                supabaseClient
                    .storage
                    .from(
                        "project-files"
                    )
                    .getPublicUrl(path)
                    .data
                    .publicUrl;

            await saveProjectFile({

                projectId:
                    currentProject.id,

                fileName:
                    file.name,

                fileUrl:
                    publicUrl

            });

        }

        await loadFiles();

    }
);

// ========================================
// ACTIVITY
// ========================================

async function loadActivity(){

    const activity =
        await fetchProjectActivity(
            currentProject.id
        );

    const feed =
        document.getElementById(
            "activityFeed"
        );

    feed.innerHTML = "";

    activity.forEach(item => {

        const div =
            document.createElement("div");

        div.className =
            "activity-item";

        div.textContent =
            item.activity;

        feed.appendChild(div);

    });

}

// ========================================
// TASK MENU
// ========================================

async function loadTaskMenu(){

    const tasks =
        await fetchTasks();

    const container =
        document.getElementById(
            "tasksMenuContent"
        );

    container.innerHTML = "";

    const filtered =
        tasks.filter(task => {

            if(
                task.completed === true
            ){
                return false;
            }

            return !attachedTasks.some(
                t => t.id === task.id
            );

        });

    filtered.forEach(task => {

        const row =
            document.createElement("label");

        row.className =
            "attach-row";

        row.innerHTML = `

            <input
                type="checkbox"
                value="${task.id}"
            >

            ${task.title}

        `;

        container.appendChild(row);

    });

}

// ========================================
// NOTE MENU
// ========================================

async function loadNoteMenu(){

    const notes =
        await fetchNotes();

    const container =
        document.getElementById(
            "notesMenuContent"
        );

    container.innerHTML = "";

    notes.forEach(note => {

        const row =
            document.createElement("label");

        row.className =
            "attach-row";

        row.innerHTML = `

            <input
                type="checkbox"
                value="${note.id}"
            >

            ${note.title}

        `;

        container.appendChild(row);

    });

}

// ========================================
// ATTACH TASKS
// ========================================

document.getElementById(
    "attachTasksBtn"
).onclick =
async () => {

    const checked =
        [
            ...document.querySelectorAll(
                "#tasksMenu input:checked"
            )
        ];

    for(const item of checked){

        await attachProjectItem({

            projectId:
                currentProject.id,

            itemType:
                "task",

            itemId:
                Number(item.value)

        });

    }

    await loadLinks();

    await loadTaskMenu();

};

// ========================================
// ATTACH NOTES
// ========================================

document.getElementById(
    "attachNotesBtn"
).onclick =
async () => {

    const checked =
        [
            ...document.querySelectorAll(
                "#notesMenu input:checked"
            )
        ];

    for(const item of checked){

        await attachProjectItem({

            projectId:
                currentProject.id,

            itemType:
                "note",

            itemId:
                Number(item.value)

        });

    }

    await loadLinks();

    await loadNoteMenu();

};

// ========================================
// RENDER ATTACHED
// ========================================

function renderAttached(){

    const container =
        document.getElementById(
            "attachedItems"
        );

    container.innerHTML = "";

    attachedTasks.forEach(task => {

        const wrapper =
            document.createElement("div");

        wrapper.className =
            "attached-item";

        if(task.completed){

            wrapper.classList.add(
                "completed-task"
            );

        }

        const completedTime =
            task.completed_at
            ?
            new Date(
                task.completed_at
            ).toLocaleString()
            :
            "";

        wrapper.innerHTML = `

            <div class="attached-header">

                <div class="attached-left">

                    <span>✓</span>

                    <span>
                        ${task.title}
                    </span>

                </div>

                <div
                    style="
                        display:flex;
                        gap:10px;
                        align-items:center;
                    "
                >

                    ${
                        task.completed
                        ?
                        `
                        <span class="completed-badge">
                            Completed
                        </span>
                        `
                        :
                        `
                        <span class="complete-link">
                            Complete
                        </span>
                        `
                    }

                </div>

            </div>

            <div class="attached-preview">

                ${task.description || ""}

                ${
                    completedTime
                    ?
                    `
                    <div class="completed-time">
                        ${completedTime}
                    </div>
                    `
                    :
                    ""
                }

            </div>

        `;

        const preview =
            wrapper.querySelector(
                ".attached-preview"
            );

        wrapper.querySelector(
            ".attached-header"
        ).onclick =
        () => {

            preview.classList.toggle(
                "open"
            );

        };

        const completeBtn =
            wrapper.querySelector(
                ".complete-link"
            );

        if(completeBtn){

            completeBtn.onclick =
            e => {

                e.stopPropagation();

                activeCompletionTask =
                    task;

                document
                    .getElementById(
                        "completeModal"
                    )
                    .classList
                    .remove("hidden");

            };

        }

        container.appendChild(wrapper);

    });

}

// ========================================
// COMPLETE TASK
// ========================================

document.getElementById(
    "submitCompletionBtn"
).onclick =
async () => {

    const notes =
        document.getElementById(
            "completionNotes"
        ).value;

    const section =
        document.getElementById(
            "completionSection"
        ).value;

    const ticket =
        document.getElementById(
            "completionTicket"
        ).value;

    const addToEmail =
        document.getElementById(
            "addToEmailCheckbox"
        ).checked;

    await completeTask({

        taskId:
            activeCompletionTask.id,

        notes

    });

    if(addToEmail){

        await createEmailEntry({

            section,

            title:
                activeCompletionTask.title,

            explanation:
                notes,

            ticket,

            link:ticket

        });

    }

    await loadLinks();

    await loadTaskMenu();

    document
        .getElementById(
            "completeModal"
        )
        .classList
        .add("hidden");

};

// ========================================
// CLOSE MODAL
// ========================================

document.getElementById(
    "closeCompleteModal"
).onclick =
() => {

    document
        .getElementById(
            "completeModal"
        )
        .classList
        .add("hidden");

};

// ========================================
// DROPDOWNS
// ========================================

document.getElementById(
    "tasksBtn"
).onclick =
() => {

    document
        .getElementById(
            "tasksMenu"
        )
        .classList
        .toggle("open");

};

document.getElementById(
    "notesBtn"
).onclick =
() => {

    document
        .getElementById(
            "notesMenu"
        )
        .classList
        .toggle("open");

};

document.addEventListener(
    "click",
    e => {

        const tasksMenu =
            document.getElementById(
                "tasksMenu"
            );

        const notesMenu =
            document.getElementById(
                "notesMenu"
            );

        const tasksBtn =
            document.getElementById(
                "tasksBtn"
            );

        const notesBtn =
            document.getElementById(
                "notesBtn"
            );

        if(
            !tasksMenu.contains(e.target)
            &&
            !tasksBtn.contains(e.target)
        ){

            tasksMenu.classList.remove(
                "open"
            );

        }

        if(
            !notesMenu.contains(e.target)
            &&
            !notesBtn.contains(e.target)
        ){

            notesMenu.classList.remove(
                "open"
            );

        }

    }
);

// ========================================
// START
// ========================================

initProject();

</script>
