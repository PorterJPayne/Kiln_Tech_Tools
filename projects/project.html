<style>

/* ========================================
   PROJECT PAGE
======================================== */

.content{

    padding:10px;

}

.project-layout{

    display:grid;

    grid-template-columns:
        2.2fr
        1fr;

    gap:10px;

}

.project-panel{

    background:rgba(255,255,255,0.025);

    border:1px solid rgba(255,255,255,0.05);

    border-radius:6px;

    padding:12px;

}

.project-header{

    display:flex;

    justify-content:space-between;

    align-items:flex-start;

    gap:16px;

}

.project-title{

    font-size:24px;

    font-weight:700;

    line-height:1.1;

}

.project-description{

    margin-top:8px;

    color:rgba(255,255,255,0.65);

    line-height:1.55;

    font-size:12px;

    white-space:pre-wrap;

}

.description-edit{

    display:none;

    width:100%;

    min-height:100px;

    margin-top:8px;

}

.utility-controls{

    display:flex;

    gap:6px;

    align-items:center;

}

.mini-button{

    background:none;

    border:none;

    color:rgba(255,255,255,0.45);

    font-size:11px;

    cursor:pointer;

    padding:4px 6px;

    border-radius:4px;

}

.mini-button:hover{

    background:rgba(255,255,255,0.05);

    color:white;

}

.section-title{

    font-size:10px;

    font-weight:700;

    letter-spacing:1.4px;

    text-transform:uppercase;

    color:rgba(255,255,255,0.42);

    margin-bottom:10px;

}

.attach-toolbar{

    display:flex;

    gap:6px;

    margin-bottom:10px;

}

.attach-dropdown{

    position:relative;

}

.attach-menu{

    position:absolute;

    top:28px;

    left:0;

    width:320px;

    max-height:300px;

    overflow:auto;

    background:#111;

    border:1px solid rgba(255,255,255,0.08);

    border-radius:6px;

    padding:8px;

    display:none;

    z-index:100;

}

.attach-menu.open{

    display:block;

}

.attach-row{

    display:flex;

    align-items:center;

    gap:8px;

    min-height:30px;

    font-size:11px;

}

.attach-footer{

    margin-top:8px;

    padding-top:8px;

    border-top:1px solid rgba(255,255,255,0.06);

}

.attached-list{

    display:flex;

    flex-direction:column;

}

.attached-item{

    border-bottom:1px solid rgba(255,255,255,0.05);

    padding:4px 0;

}

.attached-header{

    min-height:36px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    cursor:pointer;

    font-size:11px;

}

.attached-left{

    display:flex;

    align-items:center;

    gap:8px;

}

.attached-preview{

    display:none;

    padding:8px 0 10px 22px;

    color:rgba(255,255,255,0.65);

    line-height:1.55;

    font-size:11px;

}

.attached-preview.open{

    display:block;

}

.remove-link{

    opacity:0.45;

    cursor:pointer;

}

.remove-link:hover{

    opacity:1;

}

.complete-link{

    color:#8ee0a7;

    cursor:pointer;

    opacity:0.85;

}

.complete-link:hover{

    opacity:1;

}

.completed-task{

    opacity:0.6;

}

.completed-task .attached-left{

    text-decoration:line-through;

}

.completed-badge{

    font-size:10px;

    color:#8ee0a7;

}

.completed-time{

    margin-top:6px;

    font-size:10px;

    color:rgba(255,255,255,0.4);

}

.journal{

    width:100%;

    min-height:240px;

    resize:vertical;

    line-height:1.6;

}

.upload-grid{

    display:grid;

    grid-template-columns:
        repeat(auto-fill,minmax(120px,1fr));

    gap:8px;

}

.upload-card img{

    width:100%;

    height:120px;

    object-fit:cover;

    border-radius:6px;

}

.upload-name{

    margin-top:4px;

    font-size:10px;

    color:rgba(255,255,255,0.5);

    overflow:hidden;

    text-overflow:ellipsis;

    white-space:nowrap;

}

.activity-item{

    padding:8px 0;

    border-bottom:1px solid rgba(255,255,255,0.05);

    font-size:11px;

    line-height:1.45;

}

.modal-overlay{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,0.5);

    display:flex;

    align-items:center;

    justify-content:center;

    z-index:1000;

}

.hidden{

    display:none;

}

.task-modal{

    width:420px;

    background:#111;

    border:1px solid rgba(255,255,255,0.08);

    border-radius:8px;

    padding:14px;

}

.modal-title{

    font-size:14px;

    font-weight:700;

    margin-bottom:12px;

}

.modal-grid{

    display:flex;

    flex-direction:column;

    gap:10px;

}

.modal-actions{

    display:flex;

    justify-content:flex-end;

    gap:8px;

    margin-top:14px;

}

.autosave{

    position:fixed;

    bottom:12px;

    right:16px;

    font-size:11px;

    opacity:0.5;

}

.activity-feed{

    max-height:420px;

    overflow:auto;

    padding-right:4px;

}

</style>

<script>

// ========================================
// STATE
// ========================================

let currentProject = null;

let attachedTasks = [];

let attachedNotes = [];

let uploadedFiles = [];

let activeCompletionTask = null;

// ========================================
// INIT
// ========================================

async function initProject(){

    const params =
        new URLSearchParams(
            window.location.search
        );

    const id =
        params.get("id");

    const projects =
        await fetchProjects();

    currentProject =
        projects.find(
            p => p.id == id
        );

    if(!currentProject) return;

    renderProject();

    await loadLinks();

    await loadActivity();

    await loadFiles();

    await loadTaskMenu();

    await loadNoteMenu();

}

// ========================================
// LOAD FILES
// ========================================

async function loadFiles(){

    uploadedFiles =
        await fetchProjectFiles(
            currentProject.id
        );

    renderUploads();

}

// ========================================
// LOAD LINKS
// ========================================

async function loadLinks(){

    const links =
        await fetchProjectLinks(
            currentProject.id
        );

    const tasks =
        await fetchTasks();

    const notes =
        await fetchNotes();

    attachedTasks =
        links
            .filter(
                l => l.item_type === "task"
            )
            .map(link =>
                tasks.find(
                    t => t.id === link.item_id
                )
            )
            .filter(Boolean);

    attachedNotes =
        links
            .filter(
                l => l.item_type === "note"
            )
            .map(link =>
                notes.find(
                    n => n.id === link.item_id
                )
            )
            .filter(Boolean);

    renderAttached();

}

// ========================================
// ACTIVITY
// ========================================

async function loadActivity(){

    const activity =
        await fetchProjectActivity(
            currentProject.id
        );

    const feed =
        document.getElementById(
            "activityFeed"
        );

    feed.innerHTML = "";

    activity.forEach(item => {

        const div =
            document.createElement("div");

        div.className =
            "activity-item";

        div.textContent =
            item.activity;

        feed.appendChild(div);

    });

}

// ========================================
// PROJECT
// ========================================

function renderProject(){

    document.getElementById(
        "projectTitle"
    ).textContent =
        currentProject.title;

    document.getElementById(
        "projectDescription"
    ).textContent =
        currentProject.description || "";

    document.getElementById(
        "projectDescriptionEdit"
    ).value =
        currentProject.description || "";

    document.getElementById(
        "projectStatus"
    ).value =
        currentProject.status || "Active";

    document.getElementById(
        "projectJournal"
    ).value =
        currentProject.journal || "";

}

// ========================================
// AUTOSAVE
// ========================================

async function autosave(){

    await supabaseClient
        .from("projects")
        .update({

            description:
                document.getElementById(
                    "projectDescriptionEdit"
                ).value,

            status:
                document.getElementById(
                    "projectStatus"
                ).value,

            journal:
                document.getElementById(
                    "projectJournal"
                ).value

        })
        .eq(
            "id",
            currentProject.id
        );

}

// ========================================
// TASK MENU
// ========================================

async function loadTaskMenu(){

    const tasks =
        await fetchTasks();

    const container =
        document.getElementById(
            "tasksMenuContent"
        );

    container.innerHTML = "";

    const filtered =
        tasks.filter(task => {

            if(
                task.completed === true
            ){
                return false;
            }

            return !attachedTasks.some(
                t => t.id === task.id
            );

        });

    filtered.forEach(task => {

        const row =
            document.createElement("label");

        row.className =
            "attach-row";

        row.innerHTML = `

            <input
                type="checkbox"
                value="${task.id}"
            >

            ${task.title}

        `;

        container.appendChild(row);

    });

}

// ========================================
// NOTE MENU
// ========================================

async function loadNoteMenu(){

    const notes =
        await fetchNotes();

    const container =
        document.getElementById(
            "notesMenuContent"
        );

    container.innerHTML = "";

    const filtered =
        notes.filter(note => {

            return !attachedNotes.some(
                n => n.id === note.id
            );

        });

    filtered.forEach(note => {

        const row =
            document.createElement("label");

        row.className =
            "attach-row";

        row.innerHTML = `

            <input
                type="checkbox"
                value="${note.id}"
            >

            ${note.title}

        `;

        container.appendChild(row);

    });

}

// ========================================
// MENUS
// ========================================

document.getElementById(
    "tasksBtn"
).onclick =
() => {

    document
        .getElementById(
            "tasksMenu"
        )
        .classList
        .toggle("open");

};

document.getElementById(
    "notesBtn"
).onclick =
() => {

    document
        .getElementById(
            "notesMenu"
        )
        .classList
        .toggle("open");

};

// ========================================
// ATTACH TASKS
// ========================================

document.getElementById(
    "attachTasksBtn"
).onclick =
async () => {

    const checked =
        [
            ...document.querySelectorAll(
                "#tasksMenu input:checked"
            )
        ];

    for(const item of checked){

        await attachProjectItem({

            projectId:
                currentProject.id,

            itemType:
                "task",

            itemId:
                Number(item.value)

        });

    }

    await addProjectActivity({

        projectId:
            currentProject.id,

        activity:
            "Attached tasks"

    });

    await loadLinks();

    await loadTaskMenu();

    await loadActivity();

};

// ========================================
// ATTACH NOTES
// ========================================

document.getElementById(
    "attachNotesBtn"
).onclick =
async () => {

    const checked =
        [
            ...document.querySelectorAll(
                "#notesMenu input:checked"
            )
        ];

    for(const item of checked){

        await attachProjectItem({

            projectId:
                currentProject.id,

            itemType:
                "note",

            itemId:
                Number(item.value)

        });

    }

    await addProjectActivity({

        projectId:
            currentProject.id,

        activity:
            "Attached notes"

    });

    await loadLinks();

    await loadNoteMenu();

    await loadActivity();

};

// ========================================
// RENDER ATTACHED
// ========================================

function renderAttached(){

    const container =
        document.getElementById(
            "attachedItems"
        );

    container.innerHTML = "";

    attachedTasks.forEach(task => {

        renderAttachedItem({

            icon:"✓",

            title:task.title,

            preview:
                task.description ||
                "No description",

            task

        });

    });

    attachedNotes.forEach(note => {

        renderAttachedItem({

            icon:"📝",

            title:note.title,

            preview:
                note.content ||
                "No content",

            note

        });

    });

}

function renderAttachedItem({

    icon,
    title,
    preview,
    task,
    note

}){

    const container =
        document.getElementById(
            "attachedItems"
        );

    const wrapper =
        document.createElement("div");

    wrapper.className =
        "attached-item";

    if(
        task?.completed
    ){

        wrapper.classList.add(
            "completed-task"
        );

    }

    const previewId =
        crypto.randomUUID();

    const completedTime =
        task?.completed_at
        ? new Date(
            task.completed_at
        ).toLocaleString()
        : "";

    wrapper.innerHTML = `

        <div class="attached-header">

            <div class="attached-left">

                <span>
                    ${icon}
                </span>

                <span>
                    ${title}
                </span>

            </div>

            <div
                style="
                    display:flex;
                    gap:12px;
                    align-items:center;
                "
            >

                ${
                    task?.completed
                    ?
                    `
                    <span class="completed-badge">
                        Completed
                    </span>
                    `
                    :
                    task
                    ?
                    `
                    <span
                        class="complete-link"
                    >
                        Complete
                    </span>
                    `
                    :
                    ""
                }

                <span class="remove-link">
                    Remove
                </span>

            </div>

        </div>

        <div
            class="attached-preview"
            id="${previewId}"
        >

            ${preview}

            ${
                completedTime
                ?
                `
                <div class="completed-time">
                    Completed:
                    ${completedTime}
                </div>
                `
                :
                ""
            }

        </div>

    `;

    const previewEl =
        wrapper.querySelector(
            ".attached-preview"
        );

    wrapper.querySelector(
        ".attached-header"
    ).onclick =
    () => {

        previewEl.classList.toggle(
            "open"
        );

    };

    wrapper.querySelector(
        ".remove-link"
    ).onclick =
    async e => {

        e.stopPropagation();

        await removeProjectItem({

            projectId:
                currentProject.id,

            itemType:
                task
                ? "task"
                : "note",

            itemId:
                task
                ? task.id
                : note.id

        });

        await loadLinks();

    };

    const completeBtn =
        wrapper.querySelector(
            ".complete-link"
        );

    if(completeBtn){

        completeBtn.onclick =
        e => {

            e.stopPropagation();

            activeCompletionTask =
                task;

            document
                .getElementById(
                    "completeModal"
                )
                .classList
                .remove("hidden");

        };

    }

    container.appendChild(wrapper);

}

// ========================================
// COMPLETE TASK
// ========================================

document.getElementById(
    "closeCompleteModal"
).onclick =
() => {

    document
        .getElementById(
            "completeModal"
        )
        .classList
        .add("hidden");

};

document.getElementById(
    "submitCompletionBtn"
).onclick =
async () => {

    const notes =
        document.getElementById(
            "completionNotes"
        ).value;

    const section =
        document.getElementById(
            "completionSection"
        ).value;

    const ticket =
        document.getElementById(
            "completionTicket"
        ).value;

    const addToEmail =
        document.getElementById(
            "addToEmailCheckbox"
        ).checked;

    await completeTask({

        taskId:
            activeCompletionTask.id,

        notes

    });

    if(addToEmail){

        await createEmailEntry({

            section,

            title:
                activeCompletionTask.title,

            explanation:
                notes,

            ticket,

            link:ticket

        });

    }

    await addProjectActivity({

        projectId:
            currentProject.id,

        activity:
            `Completed task: ${activeCompletionTask.title}`

    });

    document
        .getElementById(
            "completeModal"
        )
        .classList
        .add("hidden");

    await loadLinks();

    await loadTaskMenu();

    await loadActivity();

};

// ========================================
// FILES
// ========================================

document.getElementById(
    "fileUpload"
).addEventListener(
    "change",
    async e => {

        const files =
            [...e.target.files];

        for(const file of files){

            const path =
                `${currentProject.id}/${Date.now()}_${file.name}`;

            const upload =
                await supabaseClient
                    .storage
                    .from(
                        "project-files"
                    )
                    .upload(
                        path,
                        file
                    );
                    console.log(upload);

if(upload.error){

    console.error(
        "UPLOAD ERROR:",
        upload.error
    );

    alert(
        upload.error.message
    );

    continue;

}

            const publicUrl =
    supabaseClient
        .storage
        .from(
            "project-files"
        )
        .getPublicUrl(path)
        .data
        .publicUrl;

await saveProjectFile({

    projectId:
        currentProject.id,

    fileName:
        file.name,

    fileUrl:
        publicUrl

});

        }

        await addProjectActivity({

            projectId:
                currentProject.id,

            activity:
                "Uploaded files"

        });

        await loadFiles();

        await loadActivity();

    }
);

function renderUploads(){

    const grid =
        document.getElementById(
            "uploadGrid"
        );

    grid.innerHTML = "";

    uploadedFiles.forEach(file => {

        const card =
            document.createElement("div");

        card.className =
            "upload-card";

        card.innerHTML = `

            <div
                style="
                    position:relative;
                "
            >

                <button
                    class="mini-button delete-file-btn"
                    style="
                        position:absolute;
                        top:4px;
                        right:4px;
                        background:rgba(0,0,0,0.65);
                        border-radius:4px;
                        z-index:2;
                    "
                >
                    ✕
                </button>

                <a
                    href="${file.file_url}"
                    target="_blank"
                >

                    <img
                        src="${file.file_url}"
                    >

                </a>

            </div>

            <div class="upload-name">
                ${file.file_name}
            </div>

        `;

        grid.appendChild(card);

        // ========================================
        // DELETE FILE
        // ========================================

        card.querySelector(
            ".delete-file-btn"
        ).onclick =
        async () => {

            const path =
                decodeURIComponent(
                    file.file_url
                        .split("/project-files/")[1]
                        .split("?")[0]
                );

            await supabaseClient
                .storage
                .from("project-files")
                .remove([
                    path
                ]);

            await supabaseClient
                .from("project_files")
                .delete()
                .eq(
                    "id",
                    file.id
                );

            await loadFiles();

        };

    });

}

// ========================================
// EXPORT
// ========================================

document.getElementById(
    "exportBtn"
).onclick =
() => {

    const completed =
        attachedTasks.filter(
            t => t.completed
        );

    const active =
        attachedTasks.filter(
            t => !t.completed
        );

    const lines = [];

    lines.push(
`PROJECT UPDATE`
    );

    lines.push(
`================================`
    );

    lines.push("");

    lines.push(
`${currentProject.title}`
    );

    lines.push(
`Status: ${document.getElementById("projectStatus").value}`
    );

    lines.push("");

    lines.push(
`OVERVIEW`
    );

    lines.push(
document.getElementById(
    "projectDescription"
).textContent || "No overview provided."
    );

    lines.push("");

    if(
        completed.length
    ){

        lines.push(
`RECENT COMPLETED WORK`
        );

        completed.forEach(task => {

            lines.push(
`• ${task.title}`
            );

            if(
                task.completion_notes
            ){

                lines.push(
`  ${task.completion_notes}`
                );

            }

        });

        lines.push("");

    }

    if(
        active.length
    ){

        lines.push(
`ACTIVE WORK`
        );

        active.forEach(task => {

            lines.push(
`• ${task.title}`
            );

        });

        lines.push("");

    }

    if(
        attachedNotes.length
    ){

        lines.push(
`NOTES & OBSERVATIONS`
        );

        attachedNotes.forEach(note => {

            lines.push(
`• ${note.title}`
            );

        });

        lines.push("");

    }

    if(
        uploadedFiles.length
    ){

        lines.push(
`FILES`
        );

        uploadedFiles.forEach(file => {

            lines.push(
`• ${file.file_name}`
            );

            lines.push(
`${file.file_url}`
            );

        });

        lines.push("");

    }

    const journal =
        document.getElementById(
            "projectJournal"
        ).value;

    if(journal){

        lines.push(
`PROJECT JOURNAL`
        );

        lines.push(
journal
        );

    }

    navigator.clipboard.writeText(
        lines.join("\n")
    );

};

// ========================================
// EDIT DESCRIPTION
// ========================================

document.getElementById(
    "editDescriptionBtn"
).onclick =
() => {

    const text =
        document.getElementById(
            "projectDescription"
        );

    const edit =
        document.getElementById(
            "projectDescriptionEdit"
        );

    if(edit.style.display === "block"){

        edit.style.display = "none";

        text.style.display = "block";

        autosave();

    }

    else {

        edit.style.display = "block";

        text.style.display = "none";

    }

};

// ========================================
// AUTOSAVE EVENTS
// ========================================

document.getElementById(
    "projectStatus"
).addEventListener(
    "change",
    async () => {

        const status =
            document.getElementById(
                "projectStatus"
            ).value;

        if(
            status === "Completed"
        ){

            await supabaseClient
                .from("projects")
                .update({

                    completed_at:
                        new Date()
                            .toISOString()

                })
                .eq(
                    "id",
                    currentProject.id
                );

            await addProjectActivity({

                projectId:
                    currentProject.id,

                activity:
                    "Project marked completed"

            });

        }

        await autosave();

        await loadActivity();

    }
);

document.getElementById(
    "projectJournal"
).addEventListener(
    "input",
    autosave
);

// ========================================
// CLOSE DROPDOWNS ON OUTSIDE CLICK
// ========================================

document.addEventListener(
    "click",
    e => {

        const tasksMenu =
            document.getElementById(
                "tasksMenu"
            );

        const notesMenu =
            document.getElementById(
                "notesMenu"
            );

        const tasksBtn =
            document.getElementById(
                "tasksBtn"
            );

        const notesBtn =
            document.getElementById(
                "notesBtn"
            );

        if(
            tasksMenu
            &&
            tasksBtn
            &&
            !tasksMenu.contains(
                e.target
            )
            &&
            !tasksBtn.contains(
                e.target
            )
        ){

            tasksMenu.classList.remove(
                "open"
            );

        }

        if(
            notesMenu
            &&
            notesBtn
            &&
            !notesMenu.contains(
                e.target
            )
            &&
            !notesBtn.contains(
                e.target
            )
        ){

            notesMenu.classList.remove(
                "open"
            );

        }

    }
);


// ========================================
// START
// ========================================

initProject();

</script>

</body>
</html>
