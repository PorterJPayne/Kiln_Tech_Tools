<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Project</title>

<link
    rel="stylesheet"
    href="/core/platform1.css"
>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/core/api/supabase.js"></script>

<script src="/core/api/projects-api.js"></script>

<script src="/core/api/tasks-api.js"></script>

<script src="/core/api/notes-api.js"></script>

<script src="/core/layout.js" defer></script>

<style>

/* ========================================
   PROJECT PAGE
======================================== */

.content{

    padding:10px;

}

.project-layout{

    display:grid;

    grid-template-columns:
        2.2fr
        1fr;

    gap:10px;

}

.project-panel{

    background:rgba(255,255,255,0.025);

    border:1px solid rgba(255,255,255,0.05);

    border-radius:6px;

    padding:12px;

}

.project-header{

    display:flex;

    justify-content:space-between;

    align-items:flex-start;

    gap:16px;

}

.project-title{

    width:100%;

    font-size:24px;

    font-weight:700;

    background:none;

    border:none;

    color:white;

    outline:none;

    padding:0;

}

.project-description{

    margin-top:8px;

    width:100%;

    min-height:90px;

    resize:vertical;

    line-height:1.45;

}

.project-status{

    min-width:140px;

}

.section-title{

    font-size:10px;

    font-weight:700;

    letter-spacing:1.4px;

    text-transform:uppercase;

    color:rgba(255,255,255,0.4);

    margin-bottom:10px;

}

.project-grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:10px;

}

.project-card{

    padding:10px;

    border-radius:6px;

    background:rgba(255,255,255,0.025);

    border:1px solid rgba(255,255,255,0.05);

}

.project-item{

    display:flex;

    justify-content:space-between;

    align-items:center;

    min-height:34px;

    padding:0 4px;

    border-bottom:1px solid rgba(255,255,255,0.05);

    font-size:11px;

}

.project-item:last-child{

    border-bottom:none;

}

.quick-add{

    width:100%;

    margin-bottom:8px;

}

.activity-item{

    padding:8px 0;

    border-bottom:1px solid rgba(255,255,255,0.05);

    font-size:11px;

    line-height:1.4;

}

.activity-item:last-child{

    border-bottom:none;

}

.photo-placeholder{

    height:140px;

    border-radius:6px;

    border:1px dashed rgba(255,255,255,0.12);

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:11px;

    color:rgba(255,255,255,0.4);

}

.project-save{

    position:fixed;

    bottom:16px;

    right:16px;

    z-index:100;

}

/* ========================================
   STATUS COLORS
======================================== */

.status-active{

    background:rgba(80,180,120,0.12);

    color:#8ee0a7;

}

.status-planning{

    background:rgba(120,120,255,0.12);

    color:#a7b0ff;

}

.status-waiting{

    background:rgba(255,180,0,0.12);

    color:#ffd27a;

}

.status-blocked{

    background:rgba(255,80,80,0.12);

    color:#ff9d9d;

}

.status-completed{

    background:rgba(180,180,180,0.12);

    color:#cfcfcf;

}

</style>

</head>

<body
    class="platform-body"
    data-title="Project"
    data-description="Operational project workspace."
>

<div class="app">

    <aside
        class="sidebar"
        id="sidebar"
    ></aside>

    <main class="main platform-page">

        <div id="topbar"></div>

        <div class="content">

            <!-- HEADER -->

            <div class="project-panel">

                <div class="project-header">

                    <div style="flex:1;">

                        <input
                            id="projectTitle"
                            class="project-title"
                            placeholder="Project title"
                        >

                        <textarea
                            id="projectDescription"
                            class="input project-description"
                            placeholder="Project description..."
                        ></textarea>

                    </div>

                    <select
                        id="projectStatus"
                        class="input project-status"
                    >

                        <option value="Active">
                            Active
                        </option>

                        <option value="Planning">
                            Planning
                        </option>

                        <option value="Waiting">
                            Waiting
                        </option>

                        <option value="Blocked">
                            Blocked
                        </option>

                        <option value="Completed">
                            Completed
                        </option>

                    </select>

                </div>

            </div>

            <div style="height:10px;"></div>

            <!-- MAIN -->

            <div class="project-layout">

                <!-- LEFT -->

                <div
                    style="
                        display:flex;
                        flex-direction:column;
                        gap:10px;
                    "
                >

                    <!-- LINKS -->

                    <div class="project-panel">

                        <div class="section-title">
                            Operational Links
                        </div>

                        <div class="project-grid">

                            <!-- TASKS -->

                            <div class="project-card">

                                <input
                                    id="taskSearch"
                                    class="input quick-add"
                                    placeholder="Search tasks..."
                                >

                                <div
                                    id="projectTasks"
                                ></div>

                            </div>

                            <!-- NOTES -->

                            <div class="project-card">

                                <input
                                    id="noteSearch"
                                    class="input quick-add"
                                    placeholder="Search notes..."
                                >

                                <div
                                    id="projectNotes"
                                ></div>

                            </div>

                        </div>

                    </div>

                    <!-- JOURNAL -->

                    <div class="project-panel">

                        <div class="section-title">
                            Project Journal
                        </div>

                        <textarea
                            id="projectJournal"
                            class="input"
                            style="
                                width:100%;
                                min-height:220px;
                                resize:vertical;
                                line-height:1.5;
                            "
                            placeholder="Running project notes..."
                        ></textarea>

                    </div>

                    <!-- FILES -->

                    <div class="project-panel">

                        <div class="section-title">
                            Photos & Files
                        </div>

                        <div class="photo-placeholder">
                            Upload system coming soon
                        </div>

                    </div>

                </div>

                <!-- RIGHT -->

                <div
                    style="
                        display:flex;
                        flex-direction:column;
                        gap:10px;
                    "
                >

                    <!-- ACTIVITY -->

                    <div class="project-panel">

                        <div class="section-title">
                            Activity
                        </div>

                        <div id="activityFeed">

                            <div class="activity-item">
                                Project created
                            </div>

                        </div>

                    </div>

                    <!-- EXPORT -->

                    <div class="project-panel">

                        <div class="section-title">
                            Export
                        </div>

                        <button
                            class="button button-primary"
                            style="width:100%;"
                        >
                            Generate Project Update
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </main>

</div>

<button
    class="button button-primary project-save"
    id="saveProjectBtn"
>
    Save Project
</button>

<script>

// =========================
// STATE
// =========================

let currentProject = null;

// =========================
// INIT
// =========================

async function initProject(){

    const params =
        new URLSearchParams(
            window.location.search
        );

    const id =
        params.get("id");

    const projects =
        await fetchProjects();

    currentProject =
        projects.find(
            p => p.id == id
        );

    if(!currentProject) return;

    loadProject();

    loadTasksIntoProject();

    loadNotesIntoProject();

}

// =========================
// LOAD
// =========================

function loadProject(){

    document.getElementById(
        "projectTitle"
    ).value =
        currentProject.title || "";

    document.getElementById(
        "projectDescription"
    ).value =
        currentProject.description || "";

    document.getElementById(
        "projectStatus"
    ).value =
        currentProject.status || "Active";

}

// =========================
// SAVE
// =========================

document.getElementById(
    "saveProjectBtn"
).onclick =
async () => {

    const { error } =
        await supabaseClient
            .from("projects")
            .update({

                title:
                    document.getElementById(
                        "projectTitle"
                    ).value,

                description:
                    document.getElementById(
                        "projectDescription"
                    ).value,

                status:
                    document.getElementById(
                        "projectStatus"
                    ).value

            })
            .eq(
                "id",
                currentProject.id
            );

    if(error){

        console.error(error);

        return;

    }

    alert("Project saved");

};

// =========================
// TASKS
// =========================

async function loadTasksIntoProject(){

    const tasks =
        await fetchTasks();

    const container =
        document.getElementById(
            "projectTasks"
        );

    container.innerHTML = "";

    tasks.slice(0,8).forEach(task => {

        const div =
            document.createElement("div");

        div.className =
            "project-item";

        div.innerHTML = `

            <span>
                ${task.title}
            </span>

            <button
                class="button"
                style="
                    min-height:24px;
                    padding:0 8px;
                "
            >
                Add
            </button>

        `;

        container.appendChild(div);

    });

}

// =========================
// NOTES
// =========================

async function loadNotesIntoProject(){

    const notes =
        await fetchNotes();

    const container =
        document.getElementById(
            "projectNotes"
        );

    container.innerHTML = "";

    notes.slice(0,8).forEach(note => {

        const div =
            document.createElement("div");

        div.className =
            "project-item";

        div.innerHTML = `

            <span>
                ${note.title}
            </span>

            <button
                class="button"
                style="
                    min-height:24px;
                    padding:0 8px;
                "
            >
                Add
            </button>

        `;

        container.appendChild(div);

    });

}

// =========================
// START
// =========================

initProject();

</script>

</body>
</html>
