<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Project</title>

<link
    rel="stylesheet"
    href="/core/platform1.css"
>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/core/api/supabase.js"></script>

<script src="/core/api/projects-api.js"></script>

<script src="/core/api/tasks-api.js"></script>

<script src="/core/api/notes-api.js"></script>

<script src="/core/layout.js" defer></script>

<style>

/* ========================================
   PROJECT PAGE
======================================== */

.content{

    padding:10px;

}

.project-layout{

    display:grid;

    grid-template-columns:
        2.2fr
        1fr;

    gap:10px;

}

.project-panel{

    background:rgba(255,255,255,0.025);

    border:1px solid rgba(255,255,255,0.05);

    border-radius:6px;

    padding:12px;

}

.project-header{

    display:flex;

    justify-content:space-between;

    align-items:flex-start;

    gap:16px;

}

.project-title{

    font-size:24px;

    font-weight:700;

    line-height:1.1;

}

.project-description{

    margin-top:8px;

    color:rgba(255,255,255,0.65);

    line-height:1.55;

    font-size:12px;

    white-space:pre-wrap;

}

.description-edit{

    display:none;

    width:100%;

    min-height:100px;

    margin-top:8px;

}

.utility-controls{

    display:flex;

    gap:6px;

    align-items:center;

}

.mini-button{

    background:none;

    border:none;

    color:rgba(255,255,255,0.45);

    font-size:11px;

    cursor:pointer;

    padding:4px 6px;

    border-radius:4px;

}

.mini-button:hover{

    background:rgba(255,255,255,0.05);

    color:white;

}

.section-title{

    font-size:10px;

    font-weight:700;

    letter-spacing:1.4px;

    text-transform:uppercase;

    color:rgba(255,255,255,0.42);

    margin-bottom:10px;

}

.attach-toolbar{

    display:flex;

    gap:6px;

    margin-bottom:10px;

}

.attach-dropdown{

    position:relative;

}

.attach-menu{

    position:absolute;

    top:28px;

    left:0;

    width:320px;

    max-height:300px;

    overflow:auto;

    background:#111;

    border:1px solid rgba(255,255,255,0.08);

    border-radius:6px;

    padding:8px;

    display:none;

    z-index:100;

}

.attach-menu.open{

    display:block;

}

.attach-row{

    display:flex;

    align-items:center;

    gap:8px;

    min-height:30px;

    font-size:11px;

}

.attach-footer{

    margin-top:8px;

    padding-top:8px;

    border-top:1px solid rgba(255,255,255,0.06);

}

.attached-list{

    display:flex;

    flex-direction:column;

}

.attached-item{

    border-bottom:1px solid rgba(255,255,255,0.05);

}

.attached-header{

    min-height:36px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    cursor:pointer;

    font-size:11px;

}

.attached-left{

    display:flex;

    align-items:center;

    gap:8px;

}

.expand-arrow{

    opacity:0.45;

}

.attached-preview{

    display:none;

    padding:0 0 10px 22px;

    color:rgba(255,255,255,0.65);

    line-height:1.5;

    font-size:11px;

}

.attached-preview.open{

    display:block;

}

.remove-link{

    opacity:0.45;

    cursor:pointer;

}

.remove-link:hover{

    opacity:1;

}

.journal{

    width:100%;

    min-height:240px;

    resize:vertical;

    line-height:1.6;

}

.upload-grid{

    display:grid;

    grid-template-columns:
        repeat(auto-fill,minmax(120px,1fr));

    gap:8px;

}

.upload-card{

    position:relative;

}

.upload-card img{

    width:100%;

    height:120px;

    object-fit:cover;

    border-radius:6px;

}

.upload-name{

    margin-top:4px;

    font-size:10px;

    color:rgba(255,255,255,0.5);

}

.activity-item{

    padding:8px 0;

    border-bottom:1px solid rgba(255,255,255,0.05);

    font-size:11px;

    line-height:1.45;

}

.activity-item:last-child{

    border-bottom:none;

}

.autosave{

    position:fixed;

    bottom:12px;

    right:16px;

    font-size:11px;

    opacity:0.5;

}

</style>

</head>

<body
class="platform-body"
data-title="Project"
data-description="Operational project workspace."
>

<div class="app">

<aside
class="sidebar"
id="sidebar"
></aside>

<main class="main platform-page">

<div id="topbar"></div>

<div class="content">

<!-- HEADER -->

<div class="project-panel">

<div class="project-header">

<div style="flex:1;">

<div
id="projectTitle"
class="project-title"
>
Loading...
</div>

<div
id="projectDescription"
class="project-description"
></div>

<textarea
id="projectDescriptionEdit"
class="input description-edit"
></textarea>

</div>

<div class="utility-controls">

<select
id="projectStatus"
class="input"
>

<option>Active</option>
<option>Planning</option>
<option>Waiting</option>
<option>Blocked</option>
<option>Completed</option>

</select>

<button
class="mini-button"
id="editDescriptionBtn"
>
Edit
</button>

</div>

</div>

</div>

<div style="height:10px;"></div>

<!-- MAIN -->

<div class="project-layout">

<!-- LEFT -->

<div
style="
display:flex;
flex-direction:column;
gap:10px;
"
>

<!-- LINKS -->

<div class="project-panel">

<div class="section-title">
Operational Links
</div>

<div class="attach-toolbar">

<!-- TASKS -->

<div class="attach-dropdown">

<button
class="mini-button"
id="tasksBtn"
>
Add Tasks ▾
</button>

<div
class="attach-menu"
id="tasksMenu"
>

<div id="tasksMenuContent"></div>

<div class="attach-footer">

<button
class="button button-primary"
style="width:100%;"
id="attachTasksBtn"
>
Attach Selected
</button>

</div>

</div>

</div>

<!-- NOTES -->

<div class="attach-dropdown">

<button
class="mini-button"
id="notesBtn"
>
Add Notes ▾
</button>

<div
class="attach-menu"
id="notesMenu"
>

<div id="notesMenuContent"></div>

<div class="attach-footer">

<button
class="button button-primary"
style="width:100%;"
id="attachNotesBtn"
>
Attach Selected
</button>

</div>

</div>

</div>

</div>

<div
id="attachedItems"
class="attached-list"
></div>

</div>

<!-- JOURNAL -->

<div class="project-panel">

<div class="section-title">
Project Journal
</div>

<textarea
id="projectJournal"
class="input journal"
placeholder="Running project notes..."
></textarea>

</div>

<!-- FILES -->

<div class="project-panel">

<div class="section-title">
Files & Photos
</div>

<input
type="file"
id="fileUpload"
multiple
>

<div style="height:10px;"></div>

<div
id="uploadGrid"
class="upload-grid"
></div>

</div>

</div>

<!-- RIGHT -->

<div
style="
display:flex;
flex-direction:column;
gap:10px;
"
>

<!-- ACTIVITY -->

<div class="project-panel">

<div class="section-title">
Activity
</div>

<div id="activityFeed"></div>

</div>

<!-- EXPORT -->

<div class="project-panel">

<div class="section-title">
Project Update
</div>

<button
class="button button-primary"
style="width:100%;"
id="exportBtn"
>
Copy Project Update
</button>

</div>

</div>

</div>

</div>

</main>

</div>

<div
class="autosave"
id="autosaveStatus"
>
Saved
</div>

<script>

// ========================================
// STATE
// ========================================

let currentProject = null;

let attachedTasks = [];

let attachedNotes = [];

let uploadedFiles = [];

// ========================================
// INIT
// ========================================

async function initProject(){

    const params =
        new URLSearchParams(
            window.location.search
        );

    const id =
        params.get("id");

    const projects =
        await fetchProjects();

    currentProject =
        projects.find(
            p => p.id == id
        );

    if(!currentProject) return;

    attachedTasks =
        JSON.parse(
            localStorage.getItem(
                `project_tasks_${id}`
            ) || "[]"
        );

    attachedNotes =
        JSON.parse(
            localStorage.getItem(
                `project_notes_${id}`
            ) || "[]"
        );

    uploadedFiles =
        JSON.parse(
            localStorage.getItem(
                `project_files_${id}`
            ) || "[]"
        );

    renderProject();

    renderAttached();

    renderUploads();

    loadTaskMenu();

    loadNoteMenu();

    addActivity(
        "Opened project"
    );

}

// ========================================
// PROJECT
// ========================================

function renderProject(){

    document.getElementById(
        "projectTitle"
    ).textContent =
        currentProject.title;

    document.getElementById(
        "projectDescription"
    ).textContent =
        currentProject.description || "";

    document.getElementById(
        "projectDescriptionEdit"
    ).value =
        currentProject.description || "";

    document.getElementById(
        "projectStatus"
    ).value =
        currentProject.status || "Active";

    document.getElementById(
        "projectJournal"
    ).value =
        currentProject.journal || "";

}

// ========================================
// AUTOSAVE
// ========================================

async function autosave(){

    document.getElementById(
        "autosaveStatus"
    ).textContent =
        "Saving...";

    await supabaseClient
        .from("projects")
        .update({

            description:
                document.getElementById(
                    "projectDescriptionEdit"
                ).value,

            status:
                document.getElementById(
                    "projectStatus"
                ).value,

            journal:
                document.getElementById(
                    "projectJournal"
                ).value

        })
        .eq(
            "id",
            currentProject.id
        );

    document.getElementById(
        "projectDescription"
    ).textContent =
        document.getElementById(
            "projectDescriptionEdit"
        ).value;

    document.getElementById(
        "autosaveStatus"
    ).textContent =
        "Saved";

}

// ========================================
// DESCRIPTION EDIT
// ========================================

document.getElementById(
    "editDescriptionBtn"
).onclick =
() => {

    const text =
        document.getElementById(
            "projectDescription"
        );

    const edit =
        document.getElementById(
            "projectDescriptionEdit"
        );

    if(edit.style.display === "block"){

        edit.style.display = "none";

        text.style.display = "block";

        autosave();

        addActivity(
            "Updated description"
        );

    }

    else {

        edit.style.display = "block";

        text.style.display = "none";

    }

};

// ========================================
// ACTIVITY
// ========================================

function addActivity(text){

    const feed =
        document.getElementById(
            "activityFeed"
        );

    const item =
        document.createElement("div");

    item.className =
        "activity-item";

    item.textContent =
        text;

    feed.prepend(item);

}

// ========================================
// TASK MENU
// ========================================

async function loadTaskMenu(){

    const tasks =
        await fetchTasks();

    const container =
        document.getElementById(
            "tasksMenuContent"
        );

    container.innerHTML = "";

    const filtered =
        tasks.filter(task => {

            return !attachedTasks.some(
                t => t.id === task.id
            );

        });

    filtered.forEach(task => {

        const row =
            document.createElement("label");

        row.className =
            "attach-row";

        row.innerHTML = `

            <input
                type="checkbox"
                value="${task.id}"
            >

            ${task.title}

        `;

        container.appendChild(row);

    });

}

// ========================================
// NOTE MENU
// ========================================

async function loadNoteMenu(){

    const notes =
        await fetchNotes();

    const container =
        document.getElementById(
            "notesMenuContent"
        );

    container.innerHTML = "";

    const filtered =
        notes.filter(note => {

            return !attachedNotes.some(
                n => n.id === note.id
            );

        });

    filtered.forEach(note => {

        const row =
            document.createElement("label");

        row.className =
            "attach-row";

        row.innerHTML = `

            <input
                type="checkbox"
                value="${note.id}"
            >

            ${note.title}

        `;

        container.appendChild(row);

    });

}

// ========================================
// MENUS
// ========================================

document.getElementById(
    "tasksBtn"
).onclick =
() => {

    document
        .getElementById(
            "tasksMenu"
        )
        .classList
        .toggle("open");

};

document.getElementById(
    "notesBtn"
).onclick =
() => {

    document
        .getElementById(
            "notesMenu"
        )
        .classList
        .toggle("open");

};

// ========================================
// ATTACH TASKS
// ========================================

document.getElementById(
    "attachTasksBtn"
).onclick =
async () => {

    const checked =
        [
            ...document.querySelectorAll(
                "#tasksMenu input:checked"
            )
        ];

    const tasks =
        await fetchTasks();

    checked.forEach(item => {

        const task =
            tasks.find(
                t => t.id == item.value
            );

        if(task){

            attachedTasks.push(task);

            addActivity(
                `Attached task: ${task.title}`
            );

        }

    });

    localStorage.setItem(
        `project_tasks_${currentProject.id}`,
        JSON.stringify(attachedTasks)
    );

    renderAttached();

    loadTaskMenu();

    document
        .getElementById(
            "tasksMenu"
        )
        .classList
        .remove("open");

};

// ========================================
// ATTACH NOTES
// ========================================

document.getElementById(
    "attachNotesBtn"
).onclick =
async () => {

    const checked =
        [
            ...document.querySelectorAll(
                "#notesMenu input:checked"
            )
        ];

    const notes =
        await fetchNotes();

    checked.forEach(item => {

        const note =
            notes.find(
                n => n.id == item.value
            );

        if(note){

            attachedNotes.push(note);

            addActivity(
                `Attached note: ${note.title}`
            );

        }

    });

    localStorage.setItem(
        `project_notes_${currentProject.id}`,
        JSON.stringify(attachedNotes)
    );

    renderAttached();

    loadNoteMenu();

    document
        .getElementById(
            "notesMenu"
        )
        .classList
        .remove("open");

};

// ========================================
// RENDER ATTACHED
// ========================================

function renderAttached(){

    const container =
        document.getElementById(
            "attachedItems"
        );

    container.innerHTML = "";

    attachedTasks.forEach(task => {

        renderAttachedItem(
            container,
            "✓",
            task.title,
            task.description ||
            "No description",
            () => removeTask(task.id)
        );

    });

    attachedNotes.forEach(note => {

        renderAttachedItem(
            container,
            "📝",
            note.title,
            note.content ||
            "No content",
            () => removeNote(note.id)
        );

    });

}

function renderAttachedItem(
    container,
    icon,
    title,
    preview,
    remove
){

    const wrapper =
        document.createElement("div");

    wrapper.className =
        "attached-item";

    const previewId =
        crypto.randomUUID();

    wrapper.innerHTML = `

        <div
            class="attached-header"
        >

            <div class="attached-left">

                <span>
                    ${icon}
                </span>

                <span>
                    ${title}
                </span>

            </div>

            <div
                style="
                    display:flex;
                    gap:10px;
                    align-items:center;
                "
            >

                <span class="expand-arrow">
                    ▼
                </span>

                <span class="remove-link">
                    Remove
                </span>

            </div>

        </div>

        <div
            class="attached-preview"
            id="${previewId}"
        >
            ${preview}
        </div>

    `;

    const header =
        wrapper.querySelector(
            ".attached-header"
        );

    const previewEl =
        wrapper.querySelector(
            ".attached-preview"
        );

    header.onclick =
    () => {

        previewEl.classList.toggle(
            "open"
        );

    };

    wrapper.querySelector(
        ".remove-link"
    ).onclick =
    e => {

        e.stopPropagation();

        remove();

    };

    container.appendChild(wrapper);

}

// ========================================
// REMOVE
// ========================================

function removeTask(id){

    attachedTasks =
        attachedTasks.filter(
            t => t.id !== id
        );

    localStorage.setItem(
        `project_tasks_${currentProject.id}`,
        JSON.stringify(attachedTasks)
    );

    renderAttached();

    loadTaskMenu();

}

function removeNote(id){

    attachedNotes =
        attachedNotes.filter(
            n => n.id !== id
        );

    localStorage.setItem(
        `project_notes_${currentProject.id}`,
        JSON.stringify(attachedNotes)
    );

    renderAttached();

    loadNoteMenu();

}

// ========================================
// FILES
// ========================================

document.getElementById(
    "fileUpload"
).addEventListener(
    "change",
    e => {

        [...e.target.files]
            .forEach(file => {

                const reader =
                    new FileReader();

                reader.onload =
                () => {

                    uploadedFiles.push({

                        name:file.name,

                        data:reader.result

                    });

                    localStorage.setItem(
                        `project_files_${currentProject.id}`,
                        JSON.stringify(uploadedFiles)
                    );

                    renderUploads();

                    addActivity(
                        `Uploaded file: ${file.name}`
                    );

                };

                reader.readAsDataURL(file);

            });

    }
);

function renderUploads(){

    const grid =
        document.getElementById(
            "uploadGrid"
        );

    grid.innerHTML = "";

    uploadedFiles.forEach(file => {

        const card =
            document.createElement("div");

        card.className =
            "upload-card";

        card.innerHTML = `

            <img src="${file.data}">

            <div class="upload-name">
                ${file.name}
            </div>

        `;

        grid.appendChild(card);

    });

}

// ========================================
// EXPORT
// ========================================

document.getElementById(
    "exportBtn"
).onclick =
() => {

    const lines = [];

    lines.push(
`PROJECT UPDATE`
    );

    lines.push(
`========================`
    );

    lines.push("");

    lines.push(
`PROJECT: ${currentProject.title}`
    );

    lines.push(
`STATUS: ${document.getElementById("projectStatus").value}`
    );

    lines.push("");

    lines.push(
`DESCRIPTION`
    );

    lines.push(
document.getElementById(
    "projectDescription"
).textContent
    );

    lines.push("");

    lines.push(
`TASKS`
    );

    attachedTasks.forEach(task => {

        lines.push(
`• ${task.title}`
        );

    });

    lines.push("");

    lines.push(
`NOTES`
    );

    attachedNotes.forEach(note => {

        lines.push(
`• ${note.title}`
        );

    });

    lines.push("");

    lines.push(
`PROJECT JOURNAL`
    );

    lines.push(
document.getElementById(
    "projectJournal"
).value
    );

    navigator.clipboard.writeText(
        lines.join("\n")
    );

    addActivity(
        "Generated project update"
    );

    alert(
        "Project update copied"
    );

};

// ========================================
// AUTOSAVE EVENTS
// ========================================

document.getElementById(
    "projectStatus"
).addEventListener(
    "change",
    () => {

        autosave();

        addActivity(
            "Updated project status"
        );

    }
);

document.getElementById(
    "projectJournal"
).addEventListener(
    "input",
    autosave
);

// ========================================
// START
// ========================================

initProject();

</script>

</body>
</html>
