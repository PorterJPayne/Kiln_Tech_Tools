<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Kiln - Project</title>

<link
    rel="stylesheet"
    href="/core/platform1.css"
>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/core/api/supabase.js"></script>

<script src="/core/api/projects-api.js"></script>

<script src="/core/api/project-links-api.js"></script>

<script src="/core/api/project-activity-api.js"></script>

<script src="/core/api/project-files-api.js"></script>

<script src="/core/api/tasks-api.js"></script>

<script src="/core/api/notes-api.js"></script>

<script src="/core/api/email-api.js"></script>

<style>

/* ========================================
   PROJECT PAGE
======================================== */

.content{

    padding:10px;

}

.project-layout{

    display:grid;

    grid-template-columns:
        2.2fr
        1fr;

    gap:10px;

}

.project-panel{

    background:rgba(255,255,255,0.025);

    border:1px solid rgba(255,255,255,0.05);

    border-radius:6px;

    padding:12px;

}

.project-header{

    display:flex;

    justify-content:space-between;

    align-items:flex-start;

    gap:16px;

}

.project-title{

    font-size:24px;

    font-weight:700;

    line-height:1.1;

}

.project-description{

    margin-top:8px;

    color:rgba(255,255,255,0.65);

    line-height:1.55;

    font-size:12px;

    white-space:pre-wrap;

}

.description-edit{

    display:none;

    width:100%;

    min-height:100px;

    margin-top:8px;

}

.utility-controls{

    display:flex;

    gap:6px;

    align-items:center;

}

.mini-button{

    background:none;

    border:none;

    color:rgba(255,255,255,0.45);

    font-size:11px;

    cursor:pointer;

    padding:4px 6px;

    border-radius:4px;

}

.mini-button:hover{

    background:rgba(255,255,255,0.05);

    color:white;

}

.section-title{

    font-size:10px;

    font-weight:700;

    letter-spacing:1.4px;

    text-transform:uppercase;

    color:rgba(255,255,255,0.42);

    margin-bottom:10px;

}

.attach-toolbar{

    display:flex;

    gap:6px;

    margin-bottom:10px;

}

.attach-dropdown{

    position:relative;

}

.attach-menu{

    position:absolute;

    top:28px;

    left:0;

    width:320px;

    max-height:300px;

    overflow:auto;

    background:#111;

    border:1px solid rgba(255,255,255,0.08);

    border-radius:6px;

    padding:8px;

    display:none;

    z-index:100;

}

.attach-menu.open{

    display:block;

}

.attach-row{

    display:flex;

    align-items:center;

    gap:8px;

    min-height:30px;

    font-size:11px;

}

.attach-footer{

    margin-top:8px;

    padding-top:8px;

    border-top:1px solid rgba(255,255,255,0.06);

}

.attached-list{

    display:flex;

    flex-direction:column;

}

.attached-item{

    border-bottom:1px solid rgba(255,255,255,0.05);

    padding:4px 0;

}

.attached-header{

    min-height:36px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    cursor:pointer;

    font-size:11px;

}

.attached-left{

    display:flex;

    align-items:center;

    gap:8px;

}

.attached-preview{

    display:none;

    padding:8px 0 10px 22px;

    color:rgba(255,255,255,0.65);

    line-height:1.55;

    font-size:11px;

}

.attached-preview.open{

    display:block;

}

.remove-link{

    opacity:0.45;

    cursor:pointer;

}

.remove-link:hover{

    opacity:1;

}

.complete-link{

    color:#8ee0a7;

    cursor:pointer;

    opacity:0.85;

}

.complete-link:hover{

    opacity:1;

}

.completed-task{

    opacity:0.6;

}

.completed-task .attached-left{

    text-decoration:line-through;

}

.completed-badge{

    font-size:10px;

    color:#8ee0a7;

}

.completed-time{

    margin-top:6px;

    font-size:10px;

    color:rgba(255,255,255,0.4);

}

.journal{

    width:100%;

    min-height:240px;

    resize:vertical;

    line-height:1.6;

}

.upload-grid{

    display:grid;

    grid-template-columns:
        repeat(auto-fill,minmax(120px,1fr));

    gap:8px;

}

.upload-card img{

    width:100%;

    height:120px;

    object-fit:cover;

    border-radius:6px;

}

.upload-name{

    margin-top:4px;

    font-size:10px;

    color:rgba(255,255,255,0.5);

    overflow:hidden;

    text-overflow:ellipsis;

    white-space:nowrap;

}

.activity-feed{

    max-height:420px;

    overflow:auto;

    padding-right:4px;

}

.activity-item{

    padding:8px 0;

    border-bottom:1px solid rgba(255,255,255,0.05);

    font-size:11px;

    line-height:1.45;

}

.modal-overlay{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,0.5);

    display:flex;

    align-items:center;

    justify-content:center;

    z-index:1000;

}

.hidden{

    display:none;

}

.task-modal{

    width:420px;

    background:#111;

    border:1px solid rgba(255,255,255,0.08);

    border-radius:8px;

    padding:14px;

}

.modal-title{

    font-size:14px;

    font-weight:700;

    margin-bottom:12px;

}

.modal-grid{

    display:flex;

    flex-direction:column;

    gap:10px;

}

.modal-actions{

    display:flex;

    justify-content:flex-end;

    gap:8px;

    margin-top:14px;

}

</style>

</head>

<body
class="platform-body"
data-title="Project"
data-description="Operational project workspace."
>

<div class="app">

<aside
class="sidebar"
id="sidebar"
></aside>

<main class="main platform-page">

<div id="topbar"></div>

<div class="content">

<div class="project-panel">

<div class="project-header">

<div style="flex:1;">

<div
id="projectTitle"
class="project-title"
>
Loading...
</div>

<div
id="projectDescription"
class="project-description"
></div>

<textarea
id="projectDescriptionEdit"
class="input description-edit"
></textarea>

</div>

<div class="utility-controls">

<select
id="projectStatus"
class="input"
>

<option>Active</option>

<option>Waiting</option>

<option>Completed</option>

</select>

<button
class="mini-button"
id="editDescriptionBtn"
>
Edit
</button>

</div>

</div>

</div>

<div style="height:10px;"></div>

<div class="project-layout">

<div
style="
display:flex;
flex-direction:column;
gap:10px;
"
>

<div class="project-panel">

<div class="section-title">
Operational Links
</div>

<div class="attach-toolbar">

<div class="attach-dropdown">

<button
class="mini-button"
id="tasksBtn"
>
Add Tasks ▾
</button>

<div
class="attach-menu"
id="tasksMenu"
>

<div id="tasksMenuContent"></div>

<div class="attach-footer">

<button
class="button button-primary"
style="width:100%;"
id="attachTasksBtn"
>
Attach Selected
</button>

</div>

</div>

</div>

<div class="attach-dropdown">

<button
class="mini-button"
id="notesBtn"
>
Add Notes ▾
</button>

<div
class="attach-menu"
id="notesMenu"
>

<div id="notesMenuContent"></div>

<div class="attach-footer">

<button
class="button button-primary"
style="width:100%;"
id="attachNotesBtn"
>
Attach Selected
</button>

</div>

</div>

</div>

</div>

<div
id="attachedItems"
class="attached-list"
></div>

</div>

<div class="project-panel">

<div class="section-title">
Project Journal
</div>

<textarea
id="projectJournal"
class="input journal"
placeholder="Running project notes..."
></textarea>

</div>

<div class="project-panel">

<div class="section-title">
Files & Photos
</div>

<input
type="file"
id="fileUpload"
multiple
>

<div style="height:10px;"></div>

<div
id="uploadGrid"
class="upload-grid"
></div>

</div>

</div>

<div
style="
display:flex;
flex-direction:column;
gap:10px;
"
>

<div class="project-panel">

<div class="section-title">
Activity
</div>

<div
id="activityFeed"
class="activity-feed"
></div>

</div>

</div>

</div>

</div>

</main>

</div>

<script>

// ========================================
// CLOSE DROPDOWNS
// ========================================

document.addEventListener(
    "click",
    e => {

        const tasksMenu =
            document.getElementById(
                "tasksMenu"
            );

        const notesMenu =
            document.getElementById(
                "notesMenu"
            );

        const tasksBtn =
            document.getElementById(
                "tasksBtn"
            );

        const notesBtn =
            document.getElementById(
                "notesBtn"
            );

        if(
            tasksMenu
            &&
            tasksBtn
            &&
            !tasksMenu.contains(
                e.target
            )
            &&
            !tasksBtn.contains(
                e.target
            )
        ){

            tasksMenu.classList.remove(
                "open"
            );

        }

        if(
            notesMenu
            &&
            notesBtn
            &&
            !notesMenu.contains(
                e.target
            )
            &&
            !notesBtn.contains(
                e.target
            )
        ){

            notesMenu.classList.remove(
                "open"
            );

        }

    }
);

// ========================================
// FILES
// ========================================

document.getElementById(
    "fileUpload"
).addEventListener(
    "change",
    async e => {

        const files =
            [...e.target.files];

        for(const file of files){

            const path =
                `${currentProject.id}/${Date.now()}_${file.name}`;

            const upload =
                await supabaseClient
                    .storage
                    .from(
                        "project-files"
                    )
                    .upload(
                        path,
                        file
                    );

            if(upload.error){

                console.error(
                    upload.error
                );

                continue;

            }

            const publicUrl =
                supabaseClient
                    .storage
                    .from(
                        "project-files"
                    )
                    .getPublicUrl(path)
                    .data
                    .publicUrl;

            await saveProjectFile({

                projectId:
                    currentProject.id,

                fileName:
                    file.name,

                fileUrl:
                    publicUrl

            });

        }

        await loadFiles();

    }
);

function renderUploads(){

    const grid =
        document.getElementById(
            "uploadGrid"
        );

    grid.innerHTML = "";

    uploadedFiles.forEach(file => {

        const isImage =
            file.file_url.match(
                /\.(jpg|jpeg|png|webp|gif)/i
            );

        const card =
            document.createElement("div");

        card.className =
            "upload-card";

        card.innerHTML = `

            <a
                href="${file.file_url}"
                target="_blank"
            >

                ${
                    isImage
                    ?
                    `
                    <img
                        src="${file.file_url}"
                    >
                    `
                    :
                    `
                    <div
                        style="
                            height:120px;
                            display:flex;
                            align-items:center;
                            justify-content:center;
                            border:1px solid rgba(255,255,255,0.08);
                            border-radius:6px;
                            font-size:11px;
                            color:rgba(255,255,255,0.5);
                        "
                    >
                        FILE
                    </div>
                    `
                }

            </a>

            <div class="upload-name">
                ${file.file_name}
            </div>

        `;

        grid.appendChild(card);

    });

}

</script>

</body>
