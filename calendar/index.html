<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kiln Calendar</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#f6f4f0;
  --card:#ffffff;
  --border:#dfdbd3;
  --text:#1f2a1f;
  --muted:#6e726d;
}

body{
  font-family:"Inter",sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow:auto;
}

.topbar{
  padding:42px 42px 28px;
  border-bottom:1px solid var(--border);
  background:#f9f8f5;
}

.topbar h2{
  font-family:"Libre Baskerville",serif;
  font-size:58px;
  margin-bottom:12px;
}

.topbar p{
  color:var(--muted);
  font-size:20px;
}

.content{
  padding:32px 42px 42px;
}

.day-group{
  margin-bottom:42px;
}

.day-title{
  font-size:13px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:#6d746b;
  margin-bottom:16px;
  font-weight:600;
}

.event-card{
  background:white;
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px 20px;
  margin-bottom:14px;
  transition:.2s;
}

.event-card:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 24px rgba(0,0,0,.05);
}

.event-time{
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#7d8e71;
  margin-bottom:10px;
  font-weight:600;
}

.event-title{
  font-size:24px;
  font-family:"Libre Baskerville",serif;
  margin-bottom:8px;
}

.event-description{
  color:#5f635d;
  line-height:1.5;
  font-size:14px;
}

.loading{
  color:#6e726d;
  font-size:16px;
}

.error{
  background:#f4dfdb;
  border:1px solid #dfbdb5;
  color:#7b463d;
  padding:18px;
  border-radius:12px;
}

</style>
</head>

<body>

<div class="topbar">

  <h2>Calendar</h2>

  <p>
    Upcoming operational events and schedules.
  </p>

</div>

<div class="content">

  <div id="eventsContainer" class="loading">
    Loading calendar...
  </div>

</div>

<script>

const CALENDAR_URL =
  "https://calendar.google.com/calendar/ical/porter.p%40kiln.com/public/basic.ics";

const eventsContainer =
  document.getElementById("eventsContainer");

async function loadCalendar(){

  try{

    const response = await fetch(
      "https://api.codetabs.com/v1/proxy/?quest=" +
      encodeURIComponent(CALENDAR_URL)
    );

    const text = await response.text();

    const events = parseICS(text);

    renderEvents(events);

  } catch(err){

    console.error(err);

    eventsContainer.innerHTML = `
      <div class="error">
        Failed to load calendar.
      </div>
    `;

  }

}

function parseICS(data){

  const lines = data.split(/\r?\n/);

  const events = [];

  let currentEvent = null;

  lines.forEach(line => {

    if(line.startsWith("BEGIN:VEVENT")){

      currentEvent = {};

    }

    else if(line.startsWith("END:VEVENT")){

      if(currentEvent){

        events.push(currentEvent);

      }

      currentEvent = null;

    }

    else if(currentEvent){

      if(line.startsWith("SUMMARY:")){

        currentEvent.title =
          line.replace("SUMMARY:","");

      }

      if(line.startsWith("DESCRIPTION:")){

        currentEvent.description =
          line.replace("DESCRIPTION:","");

      }

      if(line.startsWith("DTSTART")){

        const raw =
          line.split(":")[1];

        currentEvent.date =
          parseICSDate(raw);

      }

    }

  });

  return events
    .filter(e => e.date && e.date > new Date())
    .sort((a,b) => a.date - b.date)
    .slice(0,50);

}

function parseICSDate(raw){

  if(!raw) return null;

  const cleaned = raw.replace("Z","");

  const year = cleaned.slice(0,4);
  const month = cleaned.slice(4,6);
  const day = cleaned.slice(6,8);

  const hour = cleaned.slice(9,11) || "00";
  const minute = cleaned.slice(11,13) || "00";
  const second = cleaned.slice(13,15) || "00";

  return new Date(
    `${year}-${month}-${day}T${hour}:${minute}:${second}`
  );

}

function groupEvents(events){

  const grouped = {};

  events.forEach(event => {

    const key =
      event.date.toDateString();

    if(!grouped[key]){

      grouped[key] = [];

    }

    grouped[key].push(event);

  });

  return grouped;

}

function formatDay(date){

  return date.toLocaleDateString(
    "en-US",
    {
      weekday:"long",
      month:"long",
      day:"numeric"
    }
  );

}

function formatTime(date){

  return date.toLocaleTimeString(
    "en-US",
    {
      hour:"numeric",
      minute:"2-digit"
    }
  );

}

function renderEvents(events){

  if(!events.length){

    eventsContainer.innerHTML =
      "No upcoming events.";

    return;

  }

  const grouped = groupEvents(events);

  let html = "";

  Object.keys(grouped).forEach(day => {

    html += `
      <div class="day-group">

        <div class="day-title">
          ${formatDay(new Date(day))}
        </div>
    `;

    grouped[day].forEach(event => {

      html += `
        <div class="event-card">

          <div class="event-time">
            ${formatTime(event.date)}
          </div>

          <div class="event-title">
            ${event.title || "Untitled Event"}
          </div>

          ${
            event.description
            ? `
              <div class="event-description">
                ${event.description}
              </div>
            `
            : ""
          }

        </div>
      `;

    });

    html += `</div>`;

  });

  eventsContainer.innerHTML = html;

}

loadCalendar();

</script>

</body>
</html>
